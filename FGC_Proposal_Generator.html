function buildServiceToggle(svc) {
  // ── Restruturação: render as a section title (not a checkbox) ──
  if (svc.key === 'reestru') {
    const titleText = tl('svcReestru');
    return `<div class="reestru-section-title">${titleText}</div>`;
  }
  // Divider labels between simple / complex restructuring groups
  if (svc.divider) {
    const labels = {
      simple:  { pt: 'Simples', es: 'Simples', en: 'Simple' },
      complex: { pt: 'Complexas', es: 'Complejas', en: 'Complex' },
    };
    const label = (labels[svc.dividerType] || labels.simple)[lang];
    return `<div class="scope-section-divider">${label}</div>`;
  }
  // Hide child services (e.g., dissolution tax) when parent is not selected
  // Exception: reestru sub-items are always visible (parent is a title, not a checkbox)
  if (svc.parentKey && svc.parentKey !== 'reestru' && !state[svc.parentKey]) return '';
  if (svc.parentKey === 'reestru') { /* always render */ }
  const checked = state[svc.key] ? 'checked' : '';
  const svcData = FGC_CONFIG.services[svc.key] || {};
  let currentPrice = svcData.price;
  if (svc.key === 'will') currentPrice = FGC_CONFIG.services.bvi.willPrice;
  const priceStr = svcData.complimentary ? (lang === 'en' ? 'Complimentary' : 'Cortesia') : (currentPrice ? `${fmt(currentPrice)}` : (currentPrice === 0 ? 'TBD' : ''));
  const is3rd = svc.thirdParty;
  const isTransfer = ALL_TRANS_KEYS.includes(svc.key);
  const overrideVal = priceOverrides[svc.key] !== undefined ? priceOverrides[svc.key] : '';
  const qtyVal = qty[svc.key] || 1;

  let extraHTML = '';
  const isScopeOnly = !!svc.scopeOnly; // scope-only sub-items: no price/qty controls
  const isNegotiate = currentPrice === null || currentPrice === undefined;
  if (!isScopeOnly && state[svc.key] && !svcData.complimentary && (currentPrice || isNegotiate)) {
    extraHTML += `
      <div class="price-override-row">
        <span class="price-override-label">USD</span>
        <input type="number" class="price-override-input"
          placeholder="${isNegotiate ? '0' : currentPrice}"
          value="${overrideVal}"
          onchange="setPriceOverride('${svc.key}', this.value)"
          onclick="event.stopPropagation()">
      </div>`;
  }
  const isFormation = PIC_FORM_KEYS.includes(svc.key) || US_FORM_KEYS.includes(svc.key);
  const hasQtyControl = !isScopeOnly;
  if (state[svc.key] && hasQtyControl) {
    extraHTML += `
      <div class="qty-row">
        <span class="qty-label">${tl('lblQty')}:</span>
        <input type="number" class="qty-input" min="1" max="20"
          value="${qtyVal}"
          onchange="setQty('${svc.key}', this.value)"
          onclick="event.stopPropagation()">
      </div>`;
  }
  return `
    <label class="service-toggle">
      <input type="checkbox" ${checked} onchange="toggleService('${svc.key}', this.checked)">
      <div>
        <div class="service-toggle-label" ${is3rd?'style="font-style:italic;color:rgba(7,18,16,0.55);"':''}>${tl(svc.label)}</div>
        ${priceStr ? `<div class="service-toggle-price">${priceStr}</div>` : ''}
        ${is3rd ? `<div class="service-toggle-placeholder">${lang==='pt'?'Nota na proposta':lang==='es'?'Nota en la propuesta':'Note in proposal'}</div>` : ''}
        ${extraHTML}
      </div>
    </label>
  `;
}

function toggleCat(ci) {
  const items = document.getElementById(`cat-items-${ci}`);
  const arrow = items.previousElementSibling.querySelector('.service-cat-arrow');
  const isOpen = items.classList.contains('open');
  items.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function toggleService(key, val) {
  state[key] = val;
  if (!val) { delete priceOverrides[key]; delete qty[key]; }
  // Mutual exclusion: FS <-> FS no AFR <-> FS 3rd party, TR <-> TR 3rd party
  if (val) {
    if (key === 'fs')      { state.fs3rd = false; state.fsNoAfr = false; }
    if (key === 'fsNoAfr') { state.fs = false; state.fs3rd = false; }
    if (key === 'fs3rd')   { state.fs = false; state.fsNoAfr = false; }
    if (key === 'tr') state.tr3rd = false;
    if (key === 'tr3rd') state.tr = false;
  }
  // Auto-manage reestru master flag based on any sub-item being checked
  const REESTRU_SUB_KEYS = ['reestruDiretor','reestruMembers','reestruShare','reestruJoint','reestruGov','reestruShareClass','reestruMultiJuris','reestruNewPartner'];
  if (REESTRU_SUB_KEYS.includes(key)) {
    state.reestru = REESTRU_SUB_KEYS.some(k => state[k]);
  }
  // BVI dissolution FS+AFR is optional — do not auto-toggle
  if (key === 'dissolucaoFL') state.dissolucaoFLTR = val;
  if (key === 'dissolucaoDE') state.dissolucaoDEFS = val;
  // AFR is optional — do not auto-toggle
  renderServicePicker();
  renderTransferSub();
  renderAlerts();
  debouncedUpdate();
}

function renderTransferSub() {
  const existing = document.querySelectorAll('.transfer-sub-options');
  existing.forEach(e => e.remove());

  const hasAnyTransfer = ALL_TRANS_KEYS.some(k => state[k]);
  if (!hasAnyTransfer) return;

  // Find the transfer category container
  SERVICE_DEFS.forEach((catDef, ci) => {
    if (catDef.cat !== 'catTransfer') return;
    const itemsEl = document.getElementById(`cat-items-${ci}`);
    if (!itemsEl) return;
    const subDiv = document.createElement('div');
    subDiv.className = 'transfer-sub-options';
    subDiv.style.cssText = 'padding: 6px 10px 4px 28px; border-top: 1px solid rgba(7,18,16,0.1); margin-top: 4px;';
    subDiv.innerHTML = `
      <div style="font-size:10px;color:rgba(7,18,16,0.45);margin-bottom:6px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;">
        ${tl('lblTransferPriorService')}
      </div>
      <label class="sub-option">
        <input type="checkbox" ${state.transFS?'checked':''}
          onchange="state.transFS=this.checked;debouncedUpdate()">
        <span class="sub-option-label">${tl('optTransFS')}</span>
      </label>
      <label class="sub-option">
        <input type="checkbox" ${state.transTR?'checked':''}
          onchange="state.transTR=this.checked;debouncedUpdate()">
        <span class="sub-option-label">${tl('optTransTR')}</span>
      </label>
    `;
    itemsEl.appendChild(subDiv);
  });
}

function renderAlerts() {
  const area = document.getElementById('sidebar-alert-area');
  area.innerHTML = '';
  if (hasStandaloneOnly() && hasRegularServices()) {
    area.innerHTML += `<div class="sidebar-alert">${tl('alertStandalone')}</div>`;
  }
  // Warn about incompatible accounting + entity selections
  const hasPIC = PIC_FORM_KEYS.some(k => state[k]) || PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k]);
  const hasUS  = US_FORM_KEYS.some(k => state[k])  || US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]);
  const fsWithoutPIC = (state.fs || state.fsNoAfr || state.fs3rd) && !hasPIC;
  const trWithoutUS  = (state.tr || state.tr3rd) && !hasUS;
  if (fsWithoutPIC || trWithoutUS) {
    const msgs = {
      pt: { fs: 'DF/AFR aplicam-se apenas a entidades PIC (BVI, Bahamas, Cayman). Não será incluído na proposta sem uma entidade PIC selecionada.',
            tr: 'Tax Return aplica-se apenas a entidades US (FL, DE, NY, SD). Não será incluído na proposta sem uma entidade US selecionada.' },
      es: { fs: 'DF/AFR aplican solo a entidades PIC (BVI, Bahamas, Cayman). No se incluirá en la propuesta sin una entidad PIC seleccionada.',
            tr: 'Tax Return aplica solo a entidades US (FL, DE, NY, SD). No se incluirá en la propuesta sin una entidad US seleccionada.' },
      en: { fs: 'FS/AFR applies only to PIC entities (BVI, Bahamas, Cayman). Will not be included in the proposal without a PIC entity selected.',
            tr: 'Tax Return applies only to US entities (FL, DE, NY, SD). Will not be included in the proposal without a US entity selected.' },
    };
    if (fsWithoutPIC) area.innerHTML += `<div class="sidebar-alert">${msgs[lang].fs}</div>`;
    if (trWithoutUS)  area.innerHTML += `<div class="sidebar-alert">${msgs[lang].tr}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════
//  DEBOUNCE
// ═══════════════════════════════════════════════════════════════════
let debTimer;
function debouncedUpdate() { clearTimeout(debTimer); debTimer = setTimeout(updateTopbar, 150); }

function updateTopbar() {
  const client = document.getElementById('f-client').value.trim();
  const info = document.getElementById('topbar-info');
  if (client) info.textContent = client;
  else info.textContent = '';
}

// ═══════════════════════════════════════════════════════════════════
//  PROPOSAL GENERATION
// ═══════════════════════════════════════════════════════════════════
function generateProposal(triva) {
  const client = document.getElementById('f-client').value.trim() || '';
  const careOf = (document.getElementById('f-careof')?.value || '').trim();
  const clientEmail = document.getElementById('f-email')?.value?.trim() || '';
  const advisor= document.getElementById('f-advisor').value.trim();
  const rawDate= document.getElementById('f-date').value;
  if (advisor) { saveAdvisor(advisor); renderAdvisorChips(); }
  const dateStr = rawDate ? new Date(rawDate + 'T12:00:00').toLocaleDateString(
    lang === 'pt' ? 'pt-BR' : lang === 'es' ? 'es-MX' : 'en-US',
    { day: '2-digit', month: 'long', year: 'numeric' }
  ) : new Date().toLocaleDateString(
    lang === 'pt' ? 'pt-BR' : lang === 'es' ? 'es-MX' : 'en-US',
    { day: '2-digit', month: 'long', year: 'numeric' }
  );

  const L = T[lang];

  // ── Detect what is selected ──
  const hasPICForm    = PIC_FORM_KEYS.some(k => state[k]);
  const hasUSForm     = US_FORM_KEYS.some(k => state[k]);
  const hasFormation  = hasPICForm || hasUSForm || state.trust;
  const hasPICTrans   = PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k]);
  const hasUSTrans    = US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]);
  const hasTransfer   = hasPICTrans || hasUSTrans;
  const hasSuccession = state.will;
  // FS/AFR is only valid for PIC entities; TR is only valid for US entities
  const hasAccounting = ((state.fs || state.fsNoAfr) && (hasPICForm || hasPICTrans)) || (state.tr && (hasUSForm || hasUSTrans)) || (state.afr && (hasPICForm || hasPICTrans));
  const has3rdPartyFS = state.fs3rd && (hasPICForm || hasPICTrans);
  const has3rdPartyTR = state.tr3rd && (hasUSForm || hasUSTrans);
  const hasMaint      = hasFormation || hasTransfer;
  const hasApostila   = state.apostila;
  const hasMailing    = state.mailing;
  const hasReestru = state.reestru;
  const hasStandalone = state.dcbe || state.dissolucaoBVI || state.dissolucaoFL || state.dissolucaoDE || state.dissolucaoBVIFS || state.dissolucaoFLTR || state.dissolucaoDEFS || hasReestru;
  const hasNoTemplate = state.dcbe;
  const hasDissolution = state.dissolucaoBVI || state.dissolucaoFL || state.dissolucaoDE;
  const isDissolutionOnly = hasDissolution && !hasFormation && !hasTransfer && !hasSuccession && !hasAccounting && !hasApostila && !hasMailing && !has3rdPartyFS && !has3rdPartyTR && !state.dcbe && !hasReestru;
  const hasAnyService = hasFormation || hasTransfer || hasSuccession || hasAccounting || hasApostila || hasMailing || hasStandalone || has3rdPartyFS || has3rdPartyTR;

  if (!hasAnyService) {
    alert(lang==='pt'?'Selecione pelo menos um serviço.':lang==='es'?'Seleccione al menos un servicio.':'Please select at least one service.');
    return;
  }

  // ── Build item arrays ──
  // Helper to get term title from FGC_CONFIG
  function termTitle(key) { return (FGC_CONFIG.terms[lang] && FGC_CONFIG.terms[lang][key]) ? FGC_CONFIG.terms[lang][key].title : key; }

  // Section I items (formation + transfer, one-time fees)
  let sec1Items = [];
  // PIC formation (with qty support)
  if (state.bvi)      { const q=getQty('bvi');      sec1Items.push({ key:'bvi',      label: (q>1?q+'x ':'')+termTitle('bvi'),      amount: getPrice('bvi', FGC_CONFIG.services.bvi.price)*q,          pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.bahamas)  { const q=getQty('bahamas');  sec1Items.push({ key:'bahamas',  label: (q>1?q+'x ':'')+termTitle('bahamas'),  amount: getPrice('bahamas', FGC_CONFIG.services.bahamas.price)*q,   pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.cayman)   { const q=getQty('cayman');   sec1Items.push({ key:'cayman',   label: (q>1?q+'x ':'')+termTitle('cayman'),   amount: getPrice('cayman', FGC_CONFIG.services.cayman.price)*q,     pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.nevis)    { const q=getQty('nevis');    sec1Items.push({ key:'nevis',    label: (q>1?q+'x ':'')+termTitle('nevis'),    amount: getPrice('nevis', FGC_CONFIG.services.nevis.price)*q,       pay: L.payOnAcceptance, group:'pic', qty:q }); }
  // US formation (with qty support)
  if (state.fl)       { const q=getQty('fl');       sec1Items.push({ key:'fl',       label: (q>1?q+'x ':'')+termTitle('fl'),       amount: getPrice('fl', FGC_CONFIG.services.fl.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.de)       { const q=getQty('de');       sec1Items.push({ key:'de',       label: (q>1?q+'x ':'')+termTitle('de'),       amount: getPrice('de', FGC_CONFIG.services.de.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.ny)       { const q=getQty('ny');       sec1Items.push({ key:'ny',       label: (q>1?q+'x ':'')+termTitle('ny'),       amount: getPrice('ny', FGC_CONFIG.services.ny.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.sd)       { const q=getQty('sd');       sec1Items.push({ key:'sd',       label: (q>1?q+'x ':'')+termTitle('sd'),       amount: getPrice('sd', FGC_CONFIG.services.sd.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  // Trust (optional service, not PIC/US)
  if (state.trust)    sec1Items.push({ key:'trust',    label: termTitle('trust'),    amount: FGC_CONFIG.services.trust.price,         pay: L.payOnAcceptance });
  // PIC transfer (with qty + price override support)
  if (state.transBVI)     { const q=getQty('transBVI');     sec1Items.push({ key:'transBVI',     label: (q>1?q+'x ':'')+termTitle('transBVI'),     amount: getPrice('transBVI', FGC_CONFIG.services.transBVI.price)*q,     pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.transBahamas) { const q=getQty('transBahamas'); sec1Items.push({ key:'transBahamas', label: (q>1?q+'x ':'')+termTitle('transBahamas'), amount: getPrice('transBahamas', FGC_CONFIG.services.transBahamas.price)*q, pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.transCayman)  { const q=getQty('transCayman');  sec1Items.push({ key:'transCayman',  label: (q>1?q+'x ':'')+termTitle('transCayman'),  amount: getPrice('transCayman', FGC_CONFIG.services.transCayman.price)*q,  pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.transNevis)   { const q=getQty('transNevis');   sec1Items.push({ key:'transNevis',   label: (q>1?q+'x ':'')+termTitle('transNevis'),   amount: getPrice('transNevis', FGC_CONFIG.services.transNevis.price)*q,   pay: L.payOnAcceptance, group:'pic', qty:q }); }
  // PIC transfer (no agent change — complimentary)
  if (state.transBVIRA)     sec1Items.push({ key:'transBVIRA',     label: termTitle('transBVIRA'),     amount: FGC_CONFIG.services.transBVIRA.price,     pay: L.payOnAcceptance, group:'pic', complimentary: true });
  if (state.transBahamasRA) sec1Items.push({ key:'transBahamasRA', label: termTitle('transBahamasRA'), amount: FGC_CONFIG.services.transBahamasRA.price, pay: L.payOnAcceptance, group:'pic', complimentary: true });
  if (state.transCaymanRA)  sec1Items.push({ key:'transCaymanRA',  label: termTitle('transCaymanRA'),  amount: FGC_CONFIG.services.transCaymanRA.price,  pay: L.payOnAcceptance, group:'pic', complimentary: true });
  if (state.transNevisRA)   sec1Items.push({ key:'transNevisRA',   label: termTitle('transNevisRA'),   amount: FGC_CONFIG.services.transNevisRA.price,   pay: L.payOnAcceptance, group:'pic', complimentary: true });
  // US transfer (with qty + price override support)
  if (state.transFL)  { const q=getQty('transFL');  sec1Items.push({ key:'transFL',  label: (q>1?q+'x ':'')+termTitle('transFL'),  amount: getPrice('transFL', FGC_CONFIG.services.transFL.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transDE)  { const q=getQty('transDE');  sec1Items.push({ key:'transDE',  label: (q>1?q+'x ':'')+termTitle('transDE'),  amount: getPrice('transDE', FGC_CONFIG.services.transDE.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transNY)  { const q=getQty('transNY');  sec1Items.push({ key:'transNY',  label: (q>1?q+'x ':'')+termTitle('transNY'),  amount: getPrice('transNY', FGC_CONFIG.services.transNY.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transSD)  { const q=getQty('transSD');  sec1Items.push({ key:'transSD',  label: (q>1?q+'x ':'')+termTitle('transSD'),  amount: getPrice('transSD', FGC_CONFIG.services.transSD.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  // US transfer (no agent change — complimentary)
  if (state.transFLRA) sec1Items.push({ key:'transFLRA', label: termTitle('transFLRA'), amount: FGC_CONFIG.services.transFLRA.price, pay: L.payOnAcceptance, group:'us', complimentary: true });
  if (state.transDERA) sec1Items.push({ key:'transDERA', label: termTitle('transDERA'), amount: FGC_CONFIG.services.transDERA.price, pay: L.payOnAcceptance, group:'us', complimentary: true });
  // Apostila
  if (state.apostila) sec1Items.push({ key:'apostila', label: termTitle('apostila'), amount: FGC_CONFIG.services.apostila.price, pay: L.payOnAcceptance });
  // Transfer prior-year services (multi-select checkboxes)
  if (state.transFS)
    sec1Items.push({ key:'priorFS', label: (lang==='en'?'Prior Year Financial Statements (FS)':lang==='es'?'Estados Financieros Año Anterior (FS)':'Demonstrações Financeiras Ano Anterior (FS)'), amount: FGC_CONFIG.services.transFS.price, pay: L.payOnAcceptance });
  if (state.transTR)
    sec1Items.push({ key:'priorTR', label: (lang==='en'?'Prior Year Tax Return (TR)':lang==='es'?'Tax Return Año Anterior (TR)':'Tax Return Ano Anterior (TR)'), amount: FGC_CONFIG.services.transTR.price, pay: L.payOnAcceptance });

  // Succession section items (Will / Testamento)
  let secSuccItems = [];
  if (state.will) {
    const willQ = getQty('will');
    const willPrice = FGC_CONFIG.services.bvi.willPrice;
    secSuccItems.push({ key:'will', label: (willQ>1?willQ+'x ':'')+termTitle('will'), amount: willPrice*willQ, pay: L.payOnAcceptance, qty: willQ });
  }

  // Maintenance items (annual entity maintenance)
  let secMaintItems = [];
  // Maintenance for PIC entities (qty auto-multiplied from formation/transfer)
  function maintQty(formKey, transKey, transRAKey) {
    let q = 0;
    if (state[formKey])    q += getQty(formKey);
    if (state[transKey])   q += getQty(transKey);
    if (transRAKey && state[transRAKey]) q += 1;
    return Math.max(q, 0);
  }
  // Helper: determine maintenance pay term — driven by sidebar toggle (default: Na Aceitação)
  function maintPayTerm() {
    return state.maintPayTiming === 'year2' ? L.payFromYear2 : L.payOnAcceptance;
  }
  { const q = maintQty('bvi','transBVI','transBVIRA');         if (q>0) secMaintItems.push({ key:'bviMaint',     label: (q>1?q+'x ':'')+termTitle('bviMaint'),     amount: getPrice('bviMaint',     FGC_CONFIG.services.bviMaint.price)*q,     pay: maintPayTerm(), group:'pic', qty:q }); }
  { const q = maintQty('bahamas','transBahamas','transBahamasRA'); if (q>0) secMaintItems.push({ key:'bahamasMaint', label: (q>1?q+'x ':'')+termTitle('bahamasMaint'), amount: getPrice('bahamasMaint', FGC_CONFIG.services.bahamasMaint.price)*q, pay: maintPayTerm(), group:'pic', qty:q }); }
  { const q = maintQty('cayman','transCayman','transCaymanRA');  if (q>0) secMaintItems.push({ key:'caymanMaint',  label: (q>1?q+'x ':'')+termTitle('caymanMaint'),  amount: getPrice('caymanMaint',  FGC_CONFIG.services.caymanMaint.price)*q,  pay: maintPayTerm(), group:'pic', qty:q }); }
  { const q = maintQty('nevis','transNevis','transNevisRA');    if (q>0) secMaintItems.push({ key:'nevisMaint',   label: (q>1?q+'x ':'')+termTitle('nevisMaint'),   amount: getPrice('nevisMaint',   FGC_CONFIG.services.nevisMaint.price)*q,   pay: maintPayTerm(), group:'pic', qty:q }); }
  // Maintenance for US entities
  { const q = maintQty('fl','transFL','transFLRA');   if (q>0) secMaintItems.push({ key:'flMaint',   label: (q>1?q+'x ':'')+termTitle('flMaint'),   amount: getPrice('flMaint',   FGC_CONFIG.services.flMaint.price)*q,   pay: maintPayTerm(), group:'us', qty:q }); }
  { const q = maintQty('de','transDE','transDERA');  if (q>0) secMaintItems.push({ key:'deMaint',   label: (q>1?q+'x ':'')+termTitle('deMaint'),   amount: getPrice('deMaint',   FGC_CONFIG.services.deMaint.price)*q,   pay: maintPayTerm(), group:'us', qty:q }); }
  { const q = maintQty('ny','transNY',null);         if (q>0) secMaintItems.push({ key:'nyMaint',   label: (q>1?q+'x ':'')+termTitle('nyMaint'),   amount: getPrice('nyMaint',   FGC_CONFIG.services.nyMaint.price)*q,   pay: maintPayTerm(), group:'us', qty:q }); }
  { const q = maintQty('sd','transSD',null);         if (q>0) secMaintItems.push({ key:'sdMaint',   label: (q>1?q+'x ':'')+termTitle('sdMaint'),   amount: getPrice('sdMaint',   FGC_CONFIG.services.sdMaint.price)*q,   pay: maintPayTerm(), group:'us', qty:q }); }
  // Trust maint
  if (state.trust) secMaintItems.push({ key:'trustMaint', label: termTitle('trustMaint'), amount: getPrice('trustMaint', FGC_CONFIG.services.trustMaint.price), pay: maintPayTerm() });
  // Mailing — cortesia first year when FL is present, no repeated $300 value
  if (hasMailing) {
    const hasFL = state.fl || state.transFL || state.transFLRA;
    const mailingPay = hasFL ? L.payMailingCortesia : L.payFromYear2;
    secMaintItems.push({ key:'mailing', label: termTitle('mailing'), amount: getPrice('mailing', FGC_CONFIG.services.mailing.price), pay: mailingPay, year2only: true });
  }

  // Accounting items (separate section)
  // FS/AFR is BVI/PIC-specific; TR is US-specific. Only include when the matching entity type is selected.
  const hasPICEntity = hasPICForm || hasPICTrans;
  const hasUSEntity  = hasUSForm  || hasUSTrans;
  // FS is split into two fee-table rows to match master proposals (DF + AFR)
  const fsLabels = {
    pt: { df: 'Demonstrações Financeiras (Financial Statements)', afr: 'Annual Financial Return (AFR)' },
    es: { df: 'Estados Financieros (Financial Statements)', afr: 'Annual Financial Return (AFR)' },
    en: { df: 'Financial Statements (Demonstrações Financeiras)', afr: 'Annual Financial Return (AFR)' },
  };
  const hasBVIEntity = state.bvi || state.transBVI || state.transBVIRA;
  const bviQty = maintQty('bvi','transBVI','transBVIRA');
  const usQty  = maintQty('fl','transFL','transFLRA') + maintQty('de','transDE','transDERA') + maintQty('ny','transNY',null) + maintQty('sd','transSD',null);
  let secAcctItems = [];
  const picQty = maintQty('bvi','transBVI','transBVIRA') + maintQty('bahamas','transBahamas','transBahamasRA') + maintQty('cayman','transCayman','transCaymanRA') + maintQty('nevis','transNevis','transNevisRA');
  if (state.fs && hasPICEntity) {
    secAcctItems.push({ key:'fs',    label: (picQty>1?picQty+'x ':'')+fsLabels[lang].df,  amount: FGC_CONFIG.services.fs.price*Math.max(picQty,1), pay: L.payFromYear2, group:'pic' });
    // AFR delivery row only for BVI PICs (not Bahamas/Cayman/Nevis)
    if (hasBVIEntity) {
      secAcctItems.push({ key:'fsAfr', label: (bviQty>1?bviQty+'x ':'')+fsLabels[lang].afr, amount: null, pay: L.payFromYear2, shareRef: true, group:'pic' });
    }
  }
  // FS without AFR — for non-BVI offshores (Bahamas, Cayman, Nevis)
  if (state.fsNoAfr && hasPICEntity) {
    secAcctItems.push({ key:'fsNoAfr', label: (picQty>1?picQty+'x ':'')+fsLabels[lang].df, amount: FGC_CONFIG.services.fsNoAfr.price*Math.max(picQty,1), pay: L.payFromYear2, group:'pic' });
  }
  // FS by third party — include scope item (no fee line, terms only)
  if (state.fs3rd && hasPICEntity) {
    secAcctItems.push({ key:'fs3rd', label: { pt: 'Demonstrações Financeiras por Terceiros', es: 'Estados Financieros por Terceros', en: 'Financial Statements (Third Party)' }[lang], amount: null, pay: '—', group:'pic' });
  }
  if (state.tr && hasUSEntity)               secAcctItems.push({ key:'tr',           label: (usQty>1?usQty+'x ':'')+termTitle('tr'),           amount: FGC_CONFIG.services.tr.price*Math.max(usQty,1),           pay: L.payFromYear2, group:'us' });
  // TR by third party — include scope item (no fee line, terms only)
  if (state.tr3rd && hasUSEntity) {
    secAcctItems.push({ key:'tr3rd', label: { pt: 'Tax Return por Terceiros', es: 'Tax Return por Terceros', en: 'Tax Return (Third Party)' }[lang], amount: null, pay: '—', group:'us' });
  }
  // AFR standalone (only if FS not selected, and BVI entity exists)
  if (state.afr && !state.fs && !state.fsNoAfr && hasBVIEntity) {
    secAcctItems.push({ key:'afr', label: (bviQty>1?bviQty+'x ':'')+termTitle('afr'), amount: FGC_CONFIG.services.afr.price*Math.max(bviQty,1), pay: L.payFromYear2, group:'pic' });
  }
  // Prior-year FS (PIC entities only)
  if (state.fsAnterior && hasPICEntity) {
    secAcctItems.push({ key:'fsAnterior', label: { pt: 'Demonstrações Financeiras - Anos Anteriores', es: 'Estados Financieros - Años Anteriores', en: 'Financial Statements - Prior Years' }[lang], amount: FGC_CONFIG.services.fsAnterior.price, pay: L.payOnAcceptance, group:'pic' });
  }
  // Prior-year TR (US entities only)
  if (state.trAnterior && hasUSEntity) {
    secAcctItems.push({ key:'trAnterior', label: { pt: 'Tax Return - Anos Anteriores', es: 'Tax Return - Años Anteriores', en: 'Tax Return - Prior Years' }[lang], amount: FGC_CONFIG.services.trAnterior.price, pay: L.payOnAcceptance, group:'us' });
  }

  // Section III (dissolution / standalone)
  let sec3Items = [];
  if (state.dissolucaoBVI)   sec3Items.push({ key:'dissolucaoBVI',   label: termTitle('dissolucaoBVI'),   amount: FGC_CONFIG.services.dissolucaoBVI.price,   pay: L.payOnAcceptance });
  if (state.dissolucaoBVIFS) sec3Items.push({ key:'dissolucaoBVIFS', label: tl('svcDissolucaoBVIFS'),     amount: FGC_CONFIG.services.dissolucaoBVIFS.price, pay: L.payOnAcceptance });
  if (state.dissolucaoFL)    sec3Items.push({ key:'dissolucaoFL',    label: termTitle('dissolucaoFL'),    amount: FGC_CONFIG.services.dissolucaoFL.price,    pay: L.payOnAcceptance });
  if (state.dissolucaoFLTR)  sec3Items.push({ key:'dissolucaoFLTR',  label: tl('svcDissolucaoFLTR'),      amount: FGC_CONFIG.services.dissolucaoFLTR.price,  pay: L.payOnAcceptance });
  if (state.dissolucaoDE)    sec3Items.push({ key:'dissolucaoDE',    label: termTitle('dissolucaoDE'),    amount: FGC_CONFIG.services.dissolucaoDE.price,    pay: L.payOnAcceptance });
  if (state.dissolucaoDEFS)  sec3Items.push({ key:'dissolucaoDEFS',  label: tl('svcDissolucaoDEFS'),      amount: FGC_CONFIG.services.dissolucaoDEFS.price,  pay: L.payOnAcceptance });
  // Restruturação sub-items — each checked module is its own fee line
  ['reestruDiretor','reestruMembers','reestruShare','reestruJoint','reestruGov','reestruShareClass','reestruMultiJuris','reestruNewPartner'].forEach(k => {
    if (state[k]) {
      const p = getPrice(k, null);
      sec3Items.push({ key: k, label: termTitle(k), amount: p, pay: L.payOnAcceptance, negotiate: p===null||p===undefined||p===0 });
    }
  });

  // ── Dynamic section numbering ──
  const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  let secCounter = 0;

  // Section I header: dynamic based on formation/transfer
  let sec1Header = '';
  let sec1Num = 0;
  if (sec1Items.length > 0) {
    sec1Num = ++secCounter;
    if (hasFormation && hasTransfer) sec1Header = ROMAN[sec1Num-1] + '. ' + L.secFormTransLabel;
    else if (hasFormation)          sec1Header = ROMAN[sec1Num-1] + '. ' + L.secFormationLabel;
    else                            sec1Header = ROMAN[sec1Num-1] + '. ' + L.secTransferLabel;
    sec1Items.forEach((it, i) => { it.num = `${sec1Num}.${i+1}`; });
  }

  // Succession section number
  let secSuccHeader = '';
  let secSuccNum = 0;
  if (secSuccItems.length > 0) {
    secSuccNum = ++secCounter;
    secSuccHeader = ROMAN[secSuccNum-1] + '. ' + L.secSuccessionLabel;
    secSuccItems.forEach((it, i) => { it.num = `${secSuccNum}.${i+1}`; });
  }

  // Maintenance section number
  let secMaintHeader = '';
  let secMaintNum = 0;
  if (secMaintItems.length > 0) {
    secMaintNum = ++secCounter;
    secMaintHeader = ROMAN[secMaintNum-1] + '. ' + L.secMaintLabel;
    secMaintItems.forEach((it, i) => { it.num = `${secMaintNum}.${i+1}`; });
  }

  // Accounting section number (shareRef items reuse the previous sub-number)
  let secAcctHeader = '';
  let secAcctNum = 0;
  if (secAcctItems.length > 0) {
    secAcctNum = ++secCounter;
    secAcctHeader = ROMAN[secAcctNum-1] + '. ' + L.secAccountingLabel;
    let acctSub = 0;
    secAcctItems.forEach((it) => {
      if (!it.shareRef) acctSub++;
      it.num = `${secAcctNum}.${acctSub}`;
    });
  }

  // Other section number
  let sec3Header = '';
  let sec3Num = 0;
  if (sec3Items.length > 0) {
    sec3Num = ++secCounter;
    sec3Header = ROMAN[sec3Num-1] + '. ' + L.secOtherLabel;
    sec3Items.forEach((it, i) => { it.num = `${sec3Num}.${i+1}`; });
  }

  // Terms, TC, and Payment section numbers (used later in document assembly)
  const secTermsNum = ++secCounter;
  const secTermsHeader = ROMAN[secTermsNum-1] + '. ' + L.secTermsLabel;
  const secNotIncNum = ++secCounter;
  const secTCNum = ++secCounter;
  const secTCHeader = ROMAN[secTCNum-1] + '. ' + L.secTCLabel;

  // (Per-section subtotals are computed inline in the document assembly)

  // ── Determine proposal type and opening ──
  let propTypeLabel, openingParagraph;

  // Build higher-order service descriptions for opening paragraph
  const hasPICFormation = PIC_FORM_KEYS.some(k => state[k]);
  const hasUSFormation  = US_FORM_KEYS.some(k => state[k]);
  const hasPICTransfer  = PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k]);
  const hasUSTransfer   = US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]);

  const serviceDescriptions = [];
  const O = FGC_CONFIG.opening[lang];

  if (hasPICFormation)    serviceDescriptions.push(O.descFormationPIC);
  if (hasUSFormation)     serviceDescriptions.push(O.descFormationUS);
  if (hasPICTransfer)     serviceDescriptions.push(O.descTransferPIC);
  if (hasUSTransfer)      serviceDescriptions.push(O.descTransferUS);
  if (state.trust)        serviceDescriptions.push(O.descTrust);
  if (hasSuccession)      serviceDescriptions.push(O.descSuccession);
  if (state.dissolucaoBVI) serviceDescriptions.push(O.descDissolutionBVI);
  if (state.dissolucaoFL) serviceDescriptions.push(O.descDissolutionFL);
  if (state.dissolucaoDE) serviceDescriptions.push(O.descDissolutionDE);
  if (hasReestru) serviceDescriptions.push(O.descReestru);

  // Join with commas; only "and" before the last item
  let serviceStr = '';
  if (serviceDescriptions.length === 1) {
    serviceStr = serviceDescriptions[0];
  } else if (serviceDescriptions.length === 2) {
    serviceStr = serviceDescriptions[0] + ' ' + O.conjAnd + ' ' + serviceDescriptions[1];
  } else {
    serviceStr = serviceDescriptions.slice(0, -1).join(', ') + ' ' + O.conjAnd + ' ' + serviceDescriptions[serviceDescriptions.length - 1];
  }

  if (hasFormation || hasTransfer || hasSuccession) {
    if (hasFormation && !hasTransfer && !hasSuccession) propTypeLabel = L.typeFormation;
    else if (hasTransfer && !hasFormation && !hasSuccession) propTypeLabel = L.typeTransfer;
    else if (hasSuccession && !hasFormation && !hasTransfer) propTypeLabel = L.typeSuccession;
    else propTypeLabel = L.typeMixed;
    openingParagraph = O.template(client || 'Client', serviceStr);
  } else if (hasStandalone) {
    propTypeLabel = L.typeStandalone;
    openingParagraph = O.template(client || 'Client', serviceStr);
  } else {
    propTypeLabel = L.typeMixed;
    openingParagraph = O.template(client || 'Client', '');
  }

  // ── No-template message ──
  if (hasNoTemplate) {
    document.getElementById('proposal-empty').style.display = 'none';
    document.getElementById('proposal-doc').style.display = 'none';
    const empEl = document.getElementById('proposal-empty');
    empEl.style.display = 'flex';
    empEl.innerHTML = `
      <div class="empty-icon">◈</div>
      <h3>${tl('alertNoTemplate')}</h3>
      <p style="max-width:320px;">
        ${lang==='pt'?'Os serviços selecionados (DCBE, Certificado, Consulting, Reestruturação) não possuem template padrão. Elabore a proposta manualmente com base no escopo acordado com o cliente.':
          lang==='es'?'Los servicios seleccionados (DCBE, Certificado, Consultoría, Reestructuración) no tienen plantilla estándar. Elabore la propuesta manualmente según el alcance acordado con el cliente.':
          'The selected services (DCBE, Certificate, Consulting, Restructuring) do not have a standard template. Please draft the proposal manually based on the agreed scope with the client.'}
      </p>`;
    return;
  }

  // ── Build terms sections ──
  function buildTermsSection(title, items, note, extraNote, bankNote) {
    return `
      <div class="terms-section">
        <div class="terms-section-heading">${title}</div>
        <ul class="terms-list">
          ${items.map(i => `<li>${i}</li>`).join('')}
        </ul>
        ${bankNote ? `<div class="terms-note" style="font-style:italic;">${bankNote.replace(/\n/g, '<br>')}</div>` : ''}
        ${note ? `<div class="terms-note">${note.replace(/\n/g, '<br>')}</div>` : ''}
        ${extraNote ? `<div class="third-party-note">⚑ ${extraNote}</div>` : ''}
      </div>
    `;
  }

  // Helper: get terms entry from FGC_CONFIG for the current language
  function getTerm(key) { return (FGC_CONFIG.terms[lang] && FGC_CONFIG.terms[lang][key]) || null; }

  let termsHTML = '';
  let termsSub = 0; // Sequential numbering within the Terms/Scope section

  // Helper: build terms and assign termsRef to each item for fee-table cross-reference
  function buildTermsForItems(items, opts) {
    items.forEach(it => {
      // shareRef items (e.g. AFR row) reuse the previous item's ref, no separate terms section
      if (it.shareRef) {
        it.termsRef = `${secTermsNum}.${termsSub}`;
        return;
      }
      const m = getTerm(it.key);
      if (m) {
        const ref = `${secTermsNum}.${++termsSub}`;
        it.termsRef = ref;
        let itemsList = [...m.items];
        // Dynamic scope text for Restruturação
        if (it.key === 'reestru') {
          const objMap = {
            pt: {
              reestruDiretor:   'a inclusão ou exclusão de diretor(es) da empresa',
              reestruMembers:   'a inclusão ou exclusão de sócio(s) da empresa',
              reestruShare:     'a emissão de novo Share Certificate',
              reestruJoint:     'a inclusão de cláusula de Joint Tenancy',
              reestruGov:        'a reestruturação da governança corporativa da empresa',
              reestruShareClass: 'a alteração das classes de quotas da empresa',
              reestruMultiJuris: 'a reorganização societária em múltiplas jurisdições',
              reestruNewPartner: 'a entrada de novo sócio/investidor na estrutura societária',
            },
            es: {
              reestruDiretor:   'el cambio del (los) director(es) de la empresa',
              reestruMembers:   'el cambio de los members (socios) de la empresa',
              reestruShare:     'la emisión de un nuevo Share Certificate',
              reestruJoint:     'la inclusión de cláusula de Joint Tenancy',
              reestruGov:        'la reestructuración de la gobernanza corporativa de la empresa',
              reestruShareClass: 'la modificación de las clases de participaciones de la empresa',
              reestruMultiJuris: 'la reorganización societaria en múltiples jurisdicciones',
              reestruNewPartner: 'el ingreso de un nuevo socio/inversor en la estructura societaria',
            },
            en: {
              reestruDiretor:   'the change of director(s)',
              reestruMembers:   'the change of members',
              reestruShare:     'the issuance of a new Share Certificate',
              reestruJoint:     'the inclusion of a Joint Tenancy clause',
              reestruGov:        'corporate governance restructuring',
              reestruShareClass: 'share class restructuring',
              reestruMultiJuris: 'multi-jurisdiction corporate reorganization',
              reestruNewPartner: 'the entry of a new partner/investor into the corporate structure',
            },
          };
          const allScopeKeys = ['reestruDiretor','reestruMembers','reestruShare','reestruJoint','reestruGov','reestruShareClass','reestruMultiJuris','reestruNewPartner'];
          const selected = allScopeKeys.filter(k => state[k]);
          const customObj = extras.reestruCustomObj.trim();
          let objetivo;
          if (selected.length === 0 && !customObj) {
            objetivo = { pt:'[objetivo da alteração]', es:'[objetivo del cambio]', en:'[objective of the change]' }[lang];
          } else if (selected.length === 0 && customObj) {
            objetivo = customObj;
          } else {
            const parts = selected.map(k => objMap[lang][k]);
            const conj = { pt:' e ', es:' y ', en:' and ' }[lang];
            const joined = parts.length === 1 ? parts[0] : parts.slice(0,-1).join(', ') + conj + parts[parts.length-1];
            objetivo = customObj ? joined + { pt:', além de ', es:', además de ', en:', as well as ' }[lang] + customObj : joined;
          }
          itemsList = itemsList.map(s => s.replace('__OBJETIVO__', objetivo));
        }
        if (opts && opts.extraBullet && opts.extraBullet.key === it.key) itemsList.push(opts.extraBullet.text);
        const isPartner = opts && opts.partnerKey === it.key;
        termsHTML += buildTermsSection(`${ref} — ${m.title}`, itemsList, isPartner ? null : m.note, isPartner ? m.note : null, m.bankNote || null);
      }
    });
  }

  // Sec I terms (formation / transfer)
  buildTermsForItems(sec1Items);
  // Succession terms
  buildTermsForItems(secSuccItems);
  // Maintenance terms (BVI maint gets an extra bullet when Will is selected)
  const willMaintExtra = {
    pt: 'Gestão de prazos críticos, com alertas proativos para prevenir multas ou penalidades',
    es: 'Gestión de plazos críticos, con alertas proactivas para prevenir multas o penalidades',
    en: 'Management of critical deadlines, with proactive alerts to prevent fines or penalties',
  };
  buildTermsForItems(secMaintItems, state.will ? { extraBullet: { key: 'bviMaint', text: willMaintExtra[lang] } } : null);
  // Accounting terms
  buildTermsForItems(secAcctItems, { partnerKey: 'tr' });
  // Sec III terms
  buildTermsForItems(sec3Items);
  // Single all-encompassing note if any restructuring modules were selected
  const REESTRU_ALL_KEYS = ['reestruDiretor','reestruMembers','reestruShare','reestruJoint','reestruGov','reestruShareClass','reestruMultiJuris','reestruNewPartner'];
  if (sec3Items.some(i => REESTRU_ALL_KEYS.includes(i.key))) {
    const reestruGlobalNote = {
      pt: 'Nota aplicável a todos os serviços de reestruturação societária listados acima: os honorários propostos consideram cada escopo descrito em sua forma padrão. Caso qualquer uma das demandas envolva maior complexidade, etapas adicionais, múltiplas jurisdições, participação de terceiros ou impactos regulatórios específicos, os honorários correspondentes poderão ser revistos mediante avaliação do caso concreto.',
      es: 'Nota aplicable a todos los servicios de reestructuración societaria listados anteriormente: los honorarios propuestos contemplan cada alcance descrito en su forma estándar. En caso de que alguna de las demandas implique mayor complejidad, etapas adicionales, múltiples jurisdicciones, participación de terceros o impactos regulatorios específicos, los honorarios correspondientes podrán revisarse mediante evaluación del caso concreto.',
      en: 'Note applicable to all corporate restructuring services listed above: the proposed fees contemplate each described scope in its standard form. Should any of the engagements involve greater complexity, additional steps, multiple jurisdictions, third-party participation, or specific regulatory implications, the corresponding fees may be revised based on an evaluation of the specific case.',
    };
    termsHTML += `<div class="terms-note" style="margin-top:6px;font-style:italic;">${reestruGlobalNote[lang]}</div>`;
  }

  // ── Payment text ──
  let payText = '';
  if (isDissolutionOnly) payText = '';
  else if (hasFormation && hasTransfer) payText = FGC_CONFIG.paymentText[lang].mixed;
  else if (hasFormation && hasMaint) payText = FGC_CONFIG.paymentText[lang].formation;
  else if (hasTransfer && hasMaint) payText = FGC_CONFIG.paymentText[lang].transfer;
  else if (hasMaint && !hasFormation && !hasTransfer) payText = FGC_CONFIG.paymentText[lang].maintenanceOnly;
  else payText = FGC_CONFIG.paymentText[lang].mixed;

  // ── Dynamic timelines items (service-specific instead of generic) ──
  const timelinesItems = [];
  if ((hasPICForm || hasUSForm) && !hasTransfer) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 5 a 15 dias úteis para constituição das empresas, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 5 a 15 días hábiles para la constitución de las empresas, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for company formation is 5 to 15 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  } else if (hasTransfer && !(hasPICForm || hasUSForm)) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 5 a 15 dias úteis para transferência das empresas, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 5 a 15 días hábiles para la transferencia de las empresas, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for company transfer is 5 to 15 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  } else if ((hasPICForm || hasUSForm) && hasTransfer) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 5 a 15 dias úteis para constituição ou transferência das empresas, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 5 a 15 días hábiles para la constitución o transferencia de las empresas, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for company formation or transfer is 5 to 15 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  }
  if (hasApostila) {
    timelinesItems.push({
      pt: "O prazo estimado para notarização e apostilamento é de 10 a 15 dias úteis, contados a partir da conclusão da formação da empresa. Este prazo pode variar conforme os prazos estipulados pelos órgãos governamentais competentes.",
      es: "El plazo estimado para notarización y apostillado es de 10 a 15 días hábiles, contados desde la conclusión de la formación de la empresa. Este plazo puede variar según los plazos establecidos por las autoridades gubernamentales competentes.",
      en: "Estimated timeframe for notarization and apostille is 10 to 15 business days from completion of company formation. This timeline may vary as it is subject to timelines set by the competent government authorities.",
    }[lang]);
  }
  // BVI dissolution prazo
  if (state.dissolucaoBVI) {
    timelinesItems.push({
      pt: "Dissolução BVI: o processo de liquidação voluntária pode levar entre 2 e 3 meses, dependendo da disponibilidade do liquidante e dos prazos das autoridades locais.",
      es: "Disolución BVI: el proceso de liquidación voluntaria puede tardar entre 2 y 3 meses, dependiendo de la disponibilidad del liquidador y los plazos de las autoridades locales.",
      en: "BVI Dissolution: the voluntary liquidation process may take between 2 and 3 months, depending on the availability of the liquidator and the timelines of local authorities.",
    }[lang]);
  }
  // FL dissolution prazo
  if (state.dissolucaoFL) {
    timelinesItems.push({
      pt: "Dissolução LLC: de 3 a 5 dias úteis, após o recebimento dos termos de dissolução assinado pelo cliente.",
      es: "Disolución LLC: de 3 a 5 días hábiles, tras la recepción de los términos de disolución firmados por el cliente.",
      en: "LLC Dissolution: 3 to 5 business days upon receipt of the dissolution terms signed by the client.",
    }[lang]);
  }
  // DE dissolution prazo
  if (state.dissolucaoDE) {
    timelinesItems.push({
      pt: "Dissolução LLC: de 3 a 5 dias úteis, após o recebimento dos termos de dissolução assinado pelo cliente.",
      es: "Disolución LLC: de 3 a 5 días hábiles, tras la recepción de los términos de disolución firmados por el cliente.",
      en: "LLC Dissolution: 3 to 5 business days upon receipt of the dissolution terms signed by the client.",
    }[lang]);
  }
  // Share Trust prazo
  if (state.trust) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 15 a 30 dias úteis para constituição do Share Trust, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 15 a 30 días hábiles para la constitución del Share Trust, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for Share Trust formation is 15 to 30 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  }
  // Always include compliance review note
  timelinesItems.push({
    pt: "Esses prazos estão sujeitos a revisão da documentação e aprovação pelo nosso Departamento de Compliance.",
    es: "Estos plazos están sujetos a revisión de la documentación y aprobación por nuestro Departamento de Compliance.",
    en: "These timeframes are subject to the review and approval of the documentation by our Compliance Department.",
  }[lang]);

  // ── Build fee table rows ──
  function buildTableRows(items) {
    return items.map(it => {
      let amountStr;
      if (it.complimentary) {
        amountStr = lang === 'en' ? 'Complimentary' : 'Cortesia';
      } else if (it.negotiate) {
        amountStr = lang === 'en' ? 'To be negotiated' : lang === 'es' ? 'A negociar' : 'A negociar';
      } else if (it.amount !== null && it.amount !== undefined) {
        amountStr = fmt(it.amount);
      } else {
        amountStr = '—';
      }
      return `
      <tr>
        <td>
          <div class="row-label">${it.label}</div>
          <div class="row-ref">${L.colRef} ${it.termsRef || it.num}</div>
        </td>
        <td>
          <div class="row-amount">${amountStr}</div>
        </td>
        <td>
          <div class="row-payment">${it.pay.split('\n')[0]}</div>
          ${it.pay.includes('\n') ? it.pay.split('\n').slice(1).map(l => `<div class="row-anual">${l}</div>`).join('') : ''}
        </td>
      </tr>
    `;
    }).join('');
  }

  // ── Macro category headers ──
  function macroHeader(text) {
    return `<div class="macro-category">${text}</div>`;
  }

  function buildFeeTable(items) {
    const thRow = `<thead><tr><th>${L.colService}</th><th style="white-space:nowrap">${L.colAmount}</th><th>${L.colPayment}</th></tr></thead>`;
    return `<table class="fee-table">${thRow}<tbody>${buildTableRows(items)}</tbody></table>`;
  }

  function buildSectionSubtotal(items, isAnnual) {
    // Per-service: "Valor 1o ano" = on-acceptance items, "Valor anual a partir do 2o ano" = annual items
    // isAnnual=true: all non-complimentary items recur annually (maintenance section), so year2Total = full recurring sum
    const year1Total = items.filter(it => it.pay === L.payOnAcceptance).reduce((s, it) => s + (it.amount||0), 0);
    const year2Total = isAnnual
      ? items.filter(it => !it.complimentary).reduce((s, it) => s + (it.amount||0), 0)
      : items.filter(it => it.pay !== L.payOnAcceptance && !it.complimentary).reduce((s, it) => s + (it.amount||0), 0);
    if (year1Total <= 0 && year2Total <= 0) return '';
    const lblYear1 = { pt: 'Valor 1º ano', es: 'Valor 1er año', en: 'Year 1 Total' }[lang];
    const lblYear2 = { pt: 'Valor anual a partir do 2º ano', es: 'Valor anual a partir del 2º año', en: 'Annual Total from Year 2' }[lang];
    let html = '<div style="text-align:right;font-size:12px;font-weight:600;color:var(--dark);padding:8px 0 4px;border-top:1px solid var(--border-light);margin-top:4px;">';
    if (year1Total > 0) html += `${lblYear1}: ${fmt(year1Total)}`;
    if (year1Total > 0 && year2Total > 0) html += '<br>';
    if (year2Total > 0) html += `${lblYear2}: ${fmt(year2Total)}`;
    html += '</div>';
    return html;
  }

  const sec1PIC   = sec1Items.filter(it => it.group === 'pic');
  const sec1US    = sec1Items.filter(it => it.group === 'us');
  const sec1Other = sec1Items.filter(it => !it.group);

  const secMaintPIC   = secMaintItems.filter(it => it.group === 'pic');
  const secMaintUS    = secMaintItems.filter(it => it.group === 'us');
  const secMaintOther = secMaintItems.filter(it => !it.group);

  const secAcctPIC   = secAcctItems.filter(it => it.group === 'pic');
  const secAcctUS    = secAcctItems.filter(it => it.group === 'us');
  const secAcctOther = secAcctItems.filter(it => !it.group);

  // (Grand total summary removed — using per-section subtotals instead)

  // ── Signature section ──
  // Build grouped service items for Sim/Não confirmation
  // Complementary services are grouped together (e.g., formation + maintenance, BVI + AFR)
  const sigServiceGroups = [];

  // Group formation/transfer + their maintenance
  sec1Items.forEach(it => {
    // Find matching maintenance for this formation/transfer
    const maintMap = { bvi:'bviMaint', bahamas:'bahamasMaint', cayman:'caymanMaint', nevis:'nevisMaint',
      fl:'flMaint', de:'deMaint', ny:'nyMaint', sd:'sdMaint', trust:'trustMaint',
      transBVI:'bviMaint', transBahamas:'bahamasMaint', transCayman:'caymanMaint', transNevis:'nevisMaint',
      transFL:'flMaint', transDE:'deMaint', transNY:'nyMaint', transSD:'sdMaint',
      transBVIRA:'bviMaint', transBahamasRA:'bahamasMaint', transCaymanRA:'caymanMaint', transNevisRA:'nevisMaint',
      transFLRA:'flMaint', transDERA:'deMaint' };
    const maintKey = maintMap[it.key];
    const maintItem = maintKey ? secMaintItems.find(m => m.key === maintKey) : null;
    let groupLabel = it.label;
    if (maintItem) groupLabel += ' + ' + termTitle(maintKey);
    // Also attach AFR if this is a BVI entity
    const BVI_KEYS_SIG = ['bvi','transBVI','transBVIRA'];
    if (BVI_KEYS_SIG.includes(it.key) && (state.afr || state.fs || state.fsNoAfr)) {
      const afrItem = secAcctItems.find(a => a.key === 'afr' || a.key === 'fs' || a.key === 'fsNoAfr');
      if (afrItem) groupLabel += ' + ' + afrItem.label;
    }
    sigServiceGroups.push(groupLabel);
  });

  // Succession
  secSuccItems.forEach(it => sigServiceGroups.push(it.label));

  // Mailing address (standalone optional service)
  const mailingItem = secMaintItems.find(m => m.key === 'mailing');
  if (mailingItem) sigServiceGroups.push(mailingItem.label);

  // Accounting items not already grouped with a BVI entity label
  const hasBVIInSig = sec1Items.some(it => BVI_KEYS_SIG.includes(it.key));
  secAcctItems.forEach(it => {
    if (it.key === 'fsAfr') return; // included in FS line
    // fs/fsNoAfr/afr are grouped with the BVI entity label only when a BVI entity is present
    if (hasBVIInSig && (it.key === 'fs' || it.key === 'fsNoAfr' || it.key === 'afr')) return;
    if (it.key === 'fs3rd') return;  // described in proposal body; omit from checklist
    if (it.key === 'tr3rd') return;  // third party; omit from checklist
    sigServiceGroups.push(it.label);
  });

  // Dissolution / Other
  sec3Items.forEach(it => sigServiceGroups.push(it.label));

  // Deduplicate
  const selectedServiceNames = [...new Set(sigServiceGroups)];

  // Build named signature lines — client only (advisor determines closing signer, not a signature line)
  const sigNames = [];
  if (client) sigNames.push(client);
  const advisorVal = document.getElementById('f-advisor').value.trim();

  // Closing paragraph (Fabiana signature block) — before the acceptance section
  const closingHTML = L.closingText ? (() => {
    // Signer map: advisor name → { cursive, formal }
    const signerMap = {
      'fabiana': { cursive: 'Fabiana Ciobataru', formal: 'Fabiana G. Ciobataru' },
      'claudia': { cursive: 'Claudia Grosman', formal: 'Claudia F. Grosman' },
    };
    const advisorLower = (document.getElementById('f-advisor').value || '').trim().toLowerCase();
    // Match advisor to signer (check if advisor name contains any key)
    let signer = signerMap['fabiana']; // default
    for (const [key, val] of Object.entries(signerMap)) {
      if (advisorLower.includes(key)) { signer = val; break; }
    }
    // Replace the default name with the matched signer + cursive signature
    const styledText = L.closingText.replace(/\n/g, '<br>').replace('Fabiana G. Ciobataru',
      '<span style="font-family:\'Dancing Script\',cursive;font-size:22px;font-weight:700;display:block;margin:4px 0 2px;">' + signer.cursive + '</span><span style="font-size:11px;color:var(--text-light);">' + signer.formal + '</span>');
    return `<div style="font-size:12px;line-height:1.7;color:var(--text);margin-top:32px;margin-bottom:32px;">${styledText}</div>`;
  })() : '';

  const signatureHTML = `
    ${closingHTML}
    <div class="signature-section">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">${L.sigHeader}</div>
      <div style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:18px;">${FGC_CONFIG.sigIntro[lang]}</div>
      <div style="font-size:11px;font-weight:600;margin-bottom:8px;">${L.sigServicesLabel}</div>
      <div style="margin-bottom:24px;">
        ${selectedServiceNames.map(name => {
          const yesLabel = lang === 'en' ? 'Yes' : lang === 'es' ? 'Sí' : 'Sim';
          const noLabel  = lang === 'en' ? 'No'  : lang === 'es' ? 'No' : 'Não';
          const radioName = 'sig_' + name.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
          return `
          <div style="display:flex;align-items:center;gap:10px;font-size:11px;margin-bottom:6px;padding:4px 0;">
            <span style="flex:1;">${name}</span>
            <label style="display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;"><input type="radio" name="${radioName}" style="accent-color:var(--dark);"> ${yesLabel}</label>
            <label style="display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;"><input type="radio" name="${radioName}" style="accent-color:var(--dark);"> ${noLabel}</label>
          </div>`;
        }).join('')}
      </div>
      ${sigNames.map(name => `
      <div style="margin-bottom:28px;">
        <div style="font-size:10px;font-weight:600;color:var(--text);margin-bottom:6px;">${name}</div>
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">
          <div>
            <div style="border-bottom:1px solid var(--dark);height:36px;"></div>
            <div style="font-size:9px;color:var(--text-light);margin-top:4px;">${L.sigLine1}</div>
          </div>
          <div>
            <div style="border-bottom:1px solid var(--dark);height:36px;"></div>
            <div style="font-size:9px;color:var(--text-light);margin-top:4px;">${L.sigLine2}</div>
          </div>
        </div>
      </div>
      `).join('')}
      <div style="font-size:10px;color:var(--text-light);margin-top:16px;">${L.sigValidity}</div>
    </div>
  `;

  // ── Assemble document ──
  const docHTML = `
    <div class="doc-header">
      <div class="doc-logo">${triva
        ? `<span style="display:inline-flex;align-items:center;"><img src="${LOGO_TRIVA}" alt="Triva" style="height:18px;display:block;margin-right:6px;"><span style="font-size:11px;font-weight:400;color:var(--text-light);font-family:var(--font);margin-right:2px;">by</span><img src="${LOGO_DARK}" alt="FGC." style="height:22px;display:block;"></span>`
        : `<img src="${LOGO_DARK}" alt="FGC." style="height:44px;display:block;">`}</div>
      <div class="doc-header-label">${L.lblProposal}</div>
    </div>

    <div class="doc-body">
      <div style="font-size:12px;line-height:1.7;margin-bottom:24px;">
        <div style="font-weight:600;">${client || 'Client'}</div>
        ${careOf ? `<div style="font-size:11px;color:var(--text-light);">${L.careOfPrefix} ${careOf}</div>` : ''}
        ${clientEmail ? `<div>${clientEmail}</div>` : ''}
        <div>${dateStr}</div>
      </div>

      <div class="opening-text"><strong>${getSalutation()} ${client || 'Client'},</strong><br>${openingParagraph}</div>

      <!-- SECTION: Formation / Transfer -->
      ${sec1Items.length > 0 ? `
      <div class="doc-section">
        <div class="doc-section-header">${sec1Header}</div>
        ${sec1PIC.length > 0 ? macroHeader(L.macroPIC) + buildFeeTable(sec1PIC) : ''}
        ${sec1US.length > 0 ? macroHeader(L.macroUS) + buildFeeTable(sec1US) : ''}
        ${sec1Other.filter(it => it.key === 'trust').length > 0 ? macroHeader({ pt: 'Share Trust', es: 'Share Trust', en: 'Share Trust' }[lang]) + buildFeeTable(sec1Other.filter(it => it.key === 'trust')) : ''}
        ${sec1Other.filter(it => it.key === 'apostila').length > 0 ? macroHeader({ pt: 'Notarização e Apostilamento', es: 'Notarización y Apostillado', en: 'Notarization & Apostille' }[lang]) + buildFeeTable(sec1Other.filter(it => it.key === 'apostila')) : ''}
        ${sec1Other.filter(it => it.key !== 'trust' && it.key !== 'apostila').length > 0 ? buildFeeTable(sec1Other.filter(it => it.key !== 'trust' && it.key !== 'apostila')) : ''}
        ${sec1Items.length > 0 ? buildSectionSubtotal(sec1Items) : ''}
      </div>
      ` : ''}

      <!-- SECTION: Succession Planning -->
      ${secSuccItems.length > 0 ? `
      <div class="doc-section">
        <div class="doc-section-header">${secSuccHeader}</div>
        ${buildFeeTable(secSuccItems)}
        ${secSuccItems.length > 0 ? buildSectionSubtotal(secSuccItems) : ''}
      </div>
      ` : ''}

      <!-- SECTION: Annual Maintenance -->
      ${secMaintItems.length > 0 ? `
      <div class="doc-section">
        <div class="doc-section-header">${secMaintHeader}</div>
        ${secMaintPIC.length > 0 ? macroHeader(L.macroPIC) + buildFeeTable(secMaintPIC) : ''}
        ${secMaintUS.length > 0 ? macroHeader(L.macroUS) + buildFeeTable(secMaintUS) : ''}
        ${secMaintOther.filter(it => it.key === 'trustMaint').length > 0 ? macroHeader({ pt: 'Share Trust', es: 'Share Trust', en: 'Share Trust' }[lang]) + buildFeeTable(secMaintOther.filter(it => it.key === 'trustMaint')) : ''}
        ${secMaintOther.filter(it => it.key !== 'trustMaint').length > 0 ? buildFeeTable(secMaintOther.filter(it => it.key !== 'trustMaint')) : ''}
        ${secMaintItems.length > 0 ? buildSectionSubtotal(secMaintItems, true) : ''}
      </div>
      ` : ''}

      <!-- SECTION: Accounting Services -->
      ${secAcctItems.length > 0 ? `
      <div class="doc-section">
        <div class="doc-section-header">${secAcctHeader}</div>
        ${secAcctPIC.length > 0 ? macroHeader(L.macroPIC) + buildFeeTable(secAcctPIC) : ''}
        ${secAcctUS.length > 0 ? macroHeader(L.macroUS) + buildFeeTable(secAcctUS) : ''}
        ${secAcctOther.length > 0 ? buildFeeTable(secAcctOther) : ''}
        ${secAcctItems.length > 0 ? buildSectionSubtotal(secAcctItems) : ''}
      </div>
      ` : ''}

      <!-- SECTION: Dissolution / Other one-time -->
      ${sec3Items.length > 0 ? `
      <div class="doc-section">
        <div class="doc-section-header">${sec3Header}</div>
        ${buildFeeTable(sec3Items)}
        ${sec3Items.length > 0 ? buildSectionSubtotal(sec3Items) : ''}
      </div>
      ` : ''}

      <!-- Third-party FS/TR notes (rendered as sub-notes within Accounting section, not as separate section header) -->
      ${(has3rdPartyFS || has3rdPartyTR) ? `
      <div style="margin-top:4px;margin-bottom:8px;padding:8px 12px;background:rgba(7,18,16,0.03);border-left:3px solid var(--border);border-radius:2px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">${lang==='pt'?'Serviços por Terceiros':lang==='es'?'Servicios por Terceros':'Third-Party Services'}</div>
        ${has3rdPartyFS ? `<div class="third-party-note" style="margin-bottom:6px;">⚑ ${FGC_CONFIG.thirdPartyNotes[lang].fs}</div>` : ''}
        ${has3rdPartyTR ? `<div class="third-party-note">⚑ ${FGC_CONFIG.thirdPartyNotes[lang].tr}</div>` : ''}
      </div>
      ` : ''}

      <!-- SECTION: Scope of Services -->
      ${termsHTML ? `
      <div class="doc-section">
        <div class="doc-section-header">${secTermsHeader}</div>
        ${termsHTML}
      </div>
      ` : ''}

      <!-- Other not included (US-only proposals exclude "Reestruturações" per master templates) -->
      ${(() => {
        const clauseSet = isDissolutionOnly ? FGC_CONFIG.dissolucaoClauses[lang] : FGC_CONFIG.clauses[lang];
        let notIncItems = clauseSet.notIncludedItems;
        if (!isDissolutionOnly) {
          const reestruKeywords = { pt: 'Restruturações', es: 'Reestructuraciones', en: 'Restructurings' };
          if (!hasPICForm && !hasPICTrans) {
            notIncItems = notIncItems.filter(i => i !== reestruKeywords[lang]);
          }
        }
        // FL dissolution includes Tax Return as a scope item — remove it from not-included list
        if (isDissolutionOnly && state.dissolucaoFL && !state.dissolucaoDE) {
          const trKeywords = { pt: 'Preparação de Tax Return final', es: 'Preparación de Tax Return final', en: 'Preparation of final Tax Return' };
          notIncItems = notIncItems.filter(i => i !== trKeywords[lang]);
        }
        return `
      <div class="doc-section">
        <div class="doc-section-header">${ROMAN[secNotIncNum-1]}. ${clauseSet.notIncluded.title}</div>
        <ul class="terms-list">
          ${notIncItems.map(i => '<li>' + i + '</li>').join('')}
        </ul>
      </div>

      <!-- SECTION: Terms & Conditions -->
      <div class="doc-section">
        <div class="doc-section-header">${secTCHeader}</div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.1 — ${clauseSet.payment.title}</div>
          <ul class="terms-list">${payText ? payText.replace(/\. /g, '.|').split('|').filter(Boolean).map(s => '<li>' + s + '</li>').join('') : ''}${clauseSet.payment.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.2 — ${clauseSet.timelines.title}</div>
          <ul class="terms-list">${timelinesItems.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.3 — ${clauseSet.compliance.title}</div>
          <ul class="terms-list">${clauseSet.compliance.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.4 — ${clauseSet.representation.title}</div>
          <ul class="terms-list">${clauseSet.representation.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.5 — ${clauseSet.legalChanges.title}</div>
          <ul class="terms-list">${clauseSet.legalChanges.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
      </div>`;
      })()}

      <!-- Signature Section -->
      ${signatureHTML}
    </div>

    <div class="doc-footer">
      <div class="doc-footer-logo">${triva
        ? `<span style="display:inline-flex;align-items:center;"><img src="${LOGO_TRIVA}" alt="Triva" style="height:12px;display:block;margin-right:3px;"><span style="font-size:9px;color:var(--text-light);font-family:var(--font);margin-right:1px;">by</span><img src="${LOGO_DARK}" alt="FGC." style="height:10px;display:block;"></span>`
        : `<img src="${LOGO_DARK}" alt="FGC." style="height:24px;display:block;">`}</div>
      <div class="doc-footer-contact">
        <span>contact@fgcadvisors.com &nbsp;·&nbsp; +1 305 432 3009</span>
        <span>1001 Brickell Bay Drive #2110, Miami, FL 33131</span>
      </div>
    </div>
  `;

  const docEl = document.getElementById('proposal-doc');
  docEl.innerHTML = docHTML;
  docEl.style.display = 'block';
  document.getElementById('proposal-empty').style.display = 'none';
  document.getElementById('btn-new-proposal').style.display = '';
  updateTopbar();
  updateEmailPanel();
}

//  EMAIL PANEL

function toggleEmailPanel() {
  const panel = document.getElementById('email-panel');
  panel.classList.toggle('open');
}

function updateEmailPanel() {
  // Email language always matches proposal language
  const emailLang = lang;
  const client = document.getElementById('f-client').value.trim() || 'Cliente';

  // Build services list using term titles from FGC_CONFIG (same source as proposal)
  function emailTermTitle(k) {
    return (FGC_CONFIG.terms[emailLang] && FGC_CONFIG.terms[emailLang][k])
      ? FGC_CONFIG.terms[emailLang][k].title : k;
  }
  const services = [];
  [...PIC_FORM_KEYS, ...US_FORM_KEYS].forEach(k => { if (state[k]) services.push(emailTermTitle(k)); });
  ALL_TRANS_KEYS.forEach(k => { if (state[k]) services.push(emailTermTitle(k)); });
  if (state.trust) services.push(emailTermTitle('trust'));
  if (state.will) services.push(emailTermTitle('will'));
  if (state.apostila) services.push(emailTermTitle('apostila'));
  if (state.mailing) services.push(emailTermTitle('mailing'));
  if (state.transFS) services.push({ pt: 'Demonstrações Financeiras Ano Anterior (FS)', es: 'Estados Financieros Año Anterior (FS)', en: 'Prior Year Financial Statements (FS)' }[emailLang]);
  if (state.transTR) services.push({ pt: 'Tax Return Ano Anterior (TR)', es: 'Tax Return Año Anterior (TR)', en: 'Prior Year Tax Return (TR)' }[emailLang]);
  if (state.fs) services.push(emailTermTitle('fs'));
  if (state.fsNoAfr) services.push(emailTermTitle('fsNoAfr'));
  if (state.tr) services.push(emailTermTitle('tr'));
  if (state.fs3rd) services.push({ pt: 'Demonstrações Financeiras por Terceiros', es: 'Estados Financieros por Terceros', en: 'Financial Statements (Third Party)' }[emailLang]);
  if (state.tr3rd) services.push({ pt: 'Tax Return por Terceiros', es: 'Tax Return por Terceros', en: 'Tax Return (Third Party)' }[emailLang]);
  if (state.fsAnterior) services.push({ pt: 'Demonstrações Financeiras - Anos Anteriores', es: 'Estados Financieros - Años Anteriores', en: 'Financial Statements - Prior Years' }[emailLang]);
  if (state.trAnterior) services.push({ pt: 'Tax Return - Anos Anteriores', es: 'Tax Return - Años Anteriores', en: 'Tax Return - Prior Years' }[emailLang]);
  if (state.dissolucaoBVI) services.push(emailTermTitle('dissolucaoBVI'));
  if (state.dissolucaoFL) services.push(emailTermTitle('dissolucaoFL'));
  if (state.dissolucaoDE) services.push(emailTermTitle('dissolucaoDE'));
  if (state.reestruDiretor)    services.push(emailTermTitle('reestruDiretor'));
  if (state.reestruMembers)    services.push(emailTermTitle('reestruMembers'));
  if (state.reestruShare)      services.push(emailTermTitle('reestruShare'));
  if (state.reestruJoint)      services.push(emailTermTitle('reestruJoint'));
  if (state.reestruGov)        services.push(emailTermTitle('reestruGov'));
  if (state.reestruShareClass) services.push(emailTermTitle('reestruShareClass'));
  if (state.reestruMultiJuris) services.push(emailTermTitle('reestruMultiJuris'));
  if (state.reestruNewPartner) services.push(emailTermTitle('reestruNewPartner'));

  // Build natural-language service description (same logic as proposal opening)
  const O = FGC_CONFIG.opening[emailLang];
  const descs = [];
  if (PIC_FORM_KEYS.some(k => state[k])) descs.push(O.descFormationPIC);
  if (US_FORM_KEYS.some(k => state[k]))  descs.push(O.descFormationUS);
  if (PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k])) descs.push(O.descTransferPIC);
  if (US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]))  descs.push(O.descTransferUS);
  if (state.trust) descs.push(O.descTrust);
  if (state.will)  descs.push(O.descSuccession);
  if (state.dissolucaoBVI) descs.push(O.descDissolutionBVI);
  if (state.dissolucaoFL) descs.push(O.descDissolutionFL);
  if (state.dissolucaoDE) descs.push(O.descDissolutionDE);
  const emailHasReestru = state.reestru;
  if (emailHasReestru) descs.push(O.descReestru);
  let serviceDescription = '';
  if (descs.length === 1) serviceDescription = descs[0];
  else if (descs.length === 2) serviceDescription = descs[0] + ' ' + O.conjAnd + ' ' + descs[1];
  else if (descs.length > 2) serviceDescription = descs.slice(0, -1).join(', ') + ' ' + O.conjAnd + ' ' + descs[descs.length - 1];

  const svcList = services.map(s => `• ${s}`).join('\n');
  const body = (FGC_CONFIG.email[emailLang] && FGC_CONFIG.email[emailLang].body) ? FGC_CONFIG.email[emailLang].body(client, svcList, serviceDescription) : '';

  const ta = document.getElementById('email-textarea');
  if (ta) ta.value = body;
}

function copyEmail() {
  const ta = document.getElementById('email-textarea');
  if (!ta) return;
  ta.select();
  navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
  const btn = ta.parentElement.querySelector('.email-copy-btn');
  if (btn) { const orig = btn.textContent; btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = orig, 1500); }
}

// ═══════════════════════════════════════════════════════════════════
//  ADVISOR PERSISTENCE (localStorage)
// ═══════════════════════════════════════════════════════════════════
function getAdvisors() {
  try { return JSON.parse(localStorage.getItem('fgc_advisors') || '[]'); }
  catch(e) { return []; }
}
function saveAdvisor(name) {
  if (!name || !name.trim()) return;
  const list = getAdvisors();
  const trimmed = name.trim();
  if (!list.includes(trimmed)) {
    list.push(trimmed);
    try { localStorage.setItem('fgc_advisors', JSON.stringify(list)); } catch(e) {}
  }
}
function removeAdvisor(name) {
  const list = getAdvisors().filter(n => n !== name);
  try { localStorage.setItem('fgc_advisors', JSON.stringify(list)); } catch(e) {}
  renderAdvisorChips();
}
function addAdvisorFromInput() {
  const inp = document.getElementById('f-advisor');
  const name = inp.value.trim();
  if (!name) return;
  saveAdvisor(name);
  renderAdvisorChips();
  debouncedUpdate();
}
function selectAdvisorChip(name) {
  document.getElementById('f-advisor').value = name;
  renderAdvisorChips();
  debouncedUpdate();
}
function renderAdvisorChips() {
  const container = document.getElementById('advisor-chips');
  if (!container) return;
  const advisors = getAdvisors();
  const current = (document.getElementById('f-advisor').value || '').trim();
  container.innerHTML = '';
  advisors.forEach(name => {
    const chip = document.createElement('span');
    chip.className = 'advisor-chip' + (name === current ? ' active' : '');
    chip.onclick = () => selectAdvisorChip(name);
    chip.title = 'Click to select';
    const label = document.createElement('span');
    label.textContent = name;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'advisor-chip-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove';
    removeBtn.onclick = (e) => { e.stopPropagation(); removeAdvisor(name); };
    chip.appendChild(label);
    chip.appendChild(removeBtn);
    container.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  PDF EXPORT — uses browser print engine for perfect pagination
//  The browser respects CSS page-break rules and @page margins,
//  so content never gets cut mid-line.
// ═══════════════════════════════════════════════════════════════════
function exportInteractivePDF() {
  const proposalEl = document.getElementById('proposal-doc');
  if (!proposalEl || proposalEl.style.display === 'none') {
    alert('Please generate a proposal first.');
    return;
  }
  // Use the browser's native print dialog — select "Save as PDF"
  // The @media print CSS handles margins, page breaks, and layout
  window.print();
}

// ═══════════════════════════════════════════════════════════════════
//  RESET PROPOSAL
// ═══════════════════════════════════════════════════════════════════
function resetProposal() {
  // Reset all checkboxes
  Object.keys(state).forEach(k => { state[k] = false; });
  state.maintPayTiming = 'acceptance';
  extras.reestruCustomObj = '';
  // Reset price overrides and quantities
  priceOverrides = {};
  qty = {};
  // Clear form fields
  document.getElementById('f-client').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-advisor').value = '';
  document.getElementById('f-careof').value = '';
  // Reset date to today
  const today = new Date();
  document.getElementById('f-date').value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  // Hide proposal, show empty
  document.getElementById('proposal-doc').style.display = 'none';
  document.getElementById('proposal-empty').style.display = 'flex';
  // Re-render checkboxes
  renderServicePicker();
  renderUI();
  updateTopbar();
  // Toggle button visibility
  document.getElementById('btn-new-proposal').style.display = 'none';
  document.getElementById('btn-generate').style.display = '';
}

//  INIT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('f-date').value = `${yyyy}-${mm}-${dd}`;
  // Inject logos into sidebar buttons
  const fgcImg = document.getElementById('btn-fgc-logo');
  const trivaImg = document.getElementById('btn-triva-logo');
  if (fgcImg) fgcImg.src = LOGO_DARK;
  if (trivaImg) trivaImg.src = LOGO_TRIVA;
  renderServicePicker();
  renderUI();
  renderAdvisorChips();
});
</script>
