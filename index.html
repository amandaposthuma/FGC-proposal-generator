<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FGC. Proposal Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Barlow:wght@900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
  :root {
    --dark: #3d5450;
    --cream: #F2EFE6;
    --cream-dark: #E5E1D8;
    --yellow: #FFFFFF;
    --dust: #9AB4B0;
    --text: #071210;
    --text-light: #4a5e5b;
    --border: #c8c3b8;
    --border-light: #dedad3;
    --white: #ffffff;
    --sidebar-w: 320px;
    --email-panel-w: 380px;
    --font: 'Hanken Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: #f0ede6; color: var(--text); font-size: 14px; line-height: 1.6; }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }

  /* ── EMAIL PANEL (left side) ── */
  #email-panel {
    width: 0; min-width: 0; overflow: hidden;
    background: var(--white); border-right: 1px solid var(--border-light);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    transition: width 0.3s ease, min-width 0.3s ease;
  }
  #email-panel.open {
    width: var(--email-panel-w); min-width: var(--email-panel-w);
  }
  .email-panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .email-panel-title { font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--dark); }
  .email-panel-close {
    background: none; border: none; font-size: 18px; cursor: pointer;
    color: var(--text-light); padding: 2px 6px; border-radius: 3px;
    transition: background 0.15s;
  }
  .email-panel-close:hover { background: rgba(7,18,16,0.06); }
  .email-panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .email-lang-toggle { display: flex; gap: 4px; margin-bottom: 14px; }
  .email-lang-btn {
    flex: 1; padding: 6px 4px; border: 1px solid rgba(7,18,16,0.2);
    background: transparent; color: rgba(7,18,16,0.5);
    font-family: var(--font); font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; cursor: pointer; border-radius: 3px;
    transition: all 0.15s;
  }
  .email-lang-btn:hover { border-color: rgba(7,18,16,0.5); color: var(--dark); }
  .email-lang-btn.active { background: var(--dark); border-color: var(--dark); color: var(--yellow); }
  .email-output {
    width: 100%; min-height: 320px; padding: 12px;
    background: rgba(7,18,16,0.02); border: 1px solid rgba(7,18,16,0.12);
    border-radius: 3px; font-family: var(--font); font-size: 12px;
    line-height: 1.65; color: var(--dark); resize: vertical; outline: none;
  }
  .email-output:focus { border-color: rgba(7,18,16,0.35); }
  .email-copy-btn {
    margin-top: 10px; width: 100%; padding: 10px;
    background: var(--dark); border: none; color: var(--yellow);
    font-family: var(--font); font-size: 12px; font-weight: 600;
    cursor: pointer; border-radius: 3px; transition: opacity 0.15s;
  }
  .email-copy-btn:hover { opacity: 0.85; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--cream); color: var(--dark);
    border-right: 1px solid var(--border-light);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow: hidden;
  }
  #main { flex: 1; display: flex; flex-direction: column; }

  .sidebar-body {
    flex: 1; overflow-y: auto; min-height: 0;
  }
  .sidebar-header {
    flex-shrink: 0;
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(7,18,16,0.12);
  }
  .sidebar-logo img { display: block; }
  .sidebar-subtitle { font-size: 10px; font-weight: 400; color: rgba(7,18,16,0.45); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; }

  .sidebar-section { padding: 16px 20px 8px; }
  .sidebar-section-title {
    font-size: 9px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(7,18,16,0.35);
    margin-bottom: 10px;
  }

  /* Lang toggle */
  .lang-toggle { display: flex; gap: 4px; margin-bottom: 4px; }
  .lang-btn {
    flex: 1; padding: 6px 4px; border: 1px solid rgba(7,18,16,0.2);
    background: transparent; color: rgba(7,18,16,0.5);
    font-family: var(--font); font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; cursor: pointer; border-radius: 3px;
    transition: all 0.15s;
  }
  .lang-btn:hover { border-color: rgba(7,18,16,0.5); color: var(--dark); }
  .lang-btn.active { background: #000000; border-color: #000000; color: #ffffff; }

  /* Client fields */
  .field-group { margin-bottom: 10px; }
  .field-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(7,18,16,0.45); margin-bottom: 4px; display: block; }
  .field-input {
    width: 100%; padding: 8px 10px; background: rgba(7,18,16,0.04);
    border: 1px solid rgba(7,18,16,0.15); border-radius: 3px;
    color: var(--dark); font-family: var(--font); font-size: 13px;
    transition: border-color 0.15s; outline: none;
  }
  .field-input::placeholder { color: rgba(7,18,16,0.25); }
  .field-input:focus { border-color: rgba(7,18,16,0.4); }

  /* Service categories */
  .service-category { margin-bottom: 8px; }
  .service-cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; cursor: pointer;
    border-radius: 3px; background: rgba(7,18,16,0.04);
    transition: background 0.15s;
  }
  .service-cat-header:hover { background: rgba(7,18,16,0.08); }
  .service-cat-name { font-size: 11px; font-weight: 600; color: var(--dark); }
  .service-cat-arrow { font-size: 10px; color: rgba(7,18,16,0.35); transition: transform 0.15s; }
  .service-cat-arrow.open { transform: rotate(90deg); }
  .service-cat-items { padding: 4px 0 4px 4px; display: none; }
  .service-cat-items.open { display: block; }

  /* Sub-category label (PIC / US) */
  .service-subcat-label {
    font-size: 9px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: rgba(7,18,16,0.4);
    padding: 8px 10px 4px 10px; margin-top: 2px;
  }

  .service-toggle {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 10px; cursor: pointer; border-radius: 3px;
    transition: background 0.1s;
  }
  .service-toggle:hover { background: rgba(7,18,16,0.04); }
  .service-toggle input[type="checkbox"] {
    width: 14px; height: 14px; margin-top: 2px; cursor: pointer;
    accent-color: var(--dark); flex-shrink: 0;
  }
  .service-toggle-label { font-size: 11px; color: var(--dark); line-height: 1.4; }
  .service-toggle-price { font-size: 10px; color: rgba(7,18,16,0.45); margin-top: 1px; }
  .service-toggle-placeholder { font-size: 9px; color: rgba(7,18,16,0.35); font-style: italic; margin-top: 1px; }

  /* Sub-option (radio + checkbox) */
  .sub-option {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 28px; cursor: pointer;
  }
  .sub-option input[type="radio"],
  .sub-option input[type="checkbox"] { cursor: pointer; accent-color: var(--dark); }
  .sub-option-label { font-size: 11px; color: rgba(7,18,16,0.65); }

  /* Alert */
  .sidebar-alert {
    margin: 6px 20px; padding: 8px 12px;
    background: rgba(226,255,0,0.15); border: 1px solid rgba(7,18,16,0.2);
    border-radius: 3px; font-size: 11px; color: var(--dark); line-height: 1.4;
  }

  .sidebar-footer { flex-shrink: 0; padding: 16px 20px; border-top: 1px solid rgba(7,18,16,0.1); }
  .sidebar-footer-btns { display: flex; flex-direction: column; gap: 8px; }
  #btn-generate, #btn-generate-triva {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; background: #000000; border: none;
    color: var(--yellow); font-family: var(--font); font-size: 13px;
    font-weight: 600; letter-spacing: 0.3px; cursor: pointer; border-radius: 3px;
    transition: opacity 0.15s;
  }
  #btn-generate-triva { background: #1a3a5c; color: #ffffff; }
  #btn-generate:hover, #btn-generate-triva:hover { opacity: 0.85; }
  #btn-email-toggle {
    width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(7,18,16,0.3);
    color: var(--dark); font-family: var(--font); font-size: 13px;
    font-weight: 600; letter-spacing: 0.3px; cursor: pointer; border-radius: 3px;
    transition: all 0.15s;
  }
  #btn-email-toggle:hover { border-color: var(--dark); background: rgba(7,18,16,0.04); }
  #btn-email-toggle.active { background: #000000; color: #ffffff; border-color: #000000; }

  /* ── TOP BAR ── */
  #topbar {
    background: var(--white); border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 32px; gap: 12px;
  }
  .topbar-info { font-size: 12px; color: var(--text-light); }
  .topbar-actions { display: flex; gap: 8px; }
  .btn-action {
    padding: 7px 14px; border-radius: 3px; font-family: var(--font); font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-light); }
  .btn-outline:hover { border-color: var(--dark); color: var(--dark); }
  .btn-primary { background: var(--dark); border: 1px solid var(--dark); color: var(--cream); }
  .btn-primary:hover { opacity: 0.85; }

  /* ── PROPOSAL AREA ── */
  #proposal-area { flex: 1; padding: 32px; background: var(--cream); overflow-y: auto; }
  #proposal-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; min-height: 400px; color: var(--text-light); text-align: center;
  }
  #proposal-empty .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  #proposal-empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  #proposal-empty p { font-size: 13px; opacity: 0.6; max-width: 280px; }

  /* ── DOCUMENT ── */
  #proposal-doc {
    max-width: 760px; margin: 0 auto;
    background: var(--white);
    box-shadow: 0 1px 4px rgba(7,18,16,0.08), 0 4px 24px rgba(7,18,16,0.05);
  }
  .doc-header {
    background: var(--cream); color: var(--dark);
    padding: 28px 40px 22px; display: flex;
    align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border-light);
  }
  .doc-logo { display: flex; align-items: center; }
  .doc-header-label {
    font-size: 16px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--dark);
  }

  .doc-body { padding: 40px 40px 32px; }

  /* Proposal heading */
  .proposal-title { font-size: 20px; font-weight: 700; line-height: 1.25; margin-bottom: 6px; }
  .proposal-subtitle { font-size: 12px; color: var(--text-light); margin-bottom: 6px; margin-top: 4px; }
  .proposal-date { font-size: 11px; color: var(--text-light); margin-bottom: 28px; letter-spacing: 0.2px; }

  /* Opening */
  .opening-text { font-size: 12px; line-height: 1.7; margin-bottom: 28px; color: var(--text); }
  .opening-text strong { font-weight: 600; }

  /* Macro category label */
  .macro-category {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-light);
    margin: 24px 0 8px; padding: 6px 0; border-bottom: 1px solid var(--border-light);
  }
  .macro-category:first-of-type { margin-top: 0; }

  /* Section */
  .doc-section { margin-bottom: 28px; }
  .doc-section-header {
    font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;
    color: var(--text); padding-bottom: 7px; margin-bottom: 6px;
    border-bottom: 1.5px solid var(--dark);
  }
  .doc-section-subheader {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-light); margin-bottom: 14px;
  }

  /* Fee table */
  .fee-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 8px; }
  .fee-table th {
    background: var(--cream); color: var(--dark);
    padding: 9px 12px; text-align: left;
    font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
    border-bottom: 1.5px solid var(--dark);
  }
  .fee-table th:last-child { text-align: right; }
  .fee-table td {
    padding: 9px 12px; border-bottom: 1px solid var(--border-light);
    vertical-align: top;
  }
  .fee-table td:last-child { text-align: right; white-space: nowrap; }
  .fee-table tr:last-child td { border-bottom: none; }
  .fee-table tbody tr:hover td { border-top: 1px dotted rgba(7,18,16,0.18); border-bottom: 1px dotted rgba(7,18,16,0.18) !important; }
  .fee-table tbody tr:hover td:first-child { border-left: 1px dotted rgba(7,18,16,0.18); }
  .fee-table tbody tr:hover td:last-child { border-right: 1px dotted rgba(7,18,16,0.18); }
  .fee-table .row-label { font-size: 11px; font-weight: 500; }
  .fee-table .row-ref { font-size: 10px; color: var(--text-light); margin-top: 1px; }
  .fee-table .row-note { font-size: 10px; color: var(--text-light); font-style: italic; }
  .fee-table .row-amount { font-size: 11px; font-weight: 600; }
  .fee-table .row-payment { font-size: 10px; color: var(--text-light); }
  .fee-table .row-anual { font-size: 10px; color: var(--text-light); font-style: italic; }

  /* Subtotal row */
  .fee-table tr.subtotal-row td { background: var(--cream); font-weight: 600; border-bottom: 1.5px solid var(--dark); }
  .fee-table tr.subtotal-row td:last-child { font-size: 11px; }

  /* Cost summary box */
  .cost-summary {
    background: var(--cream); color: var(--dark);
    padding: 16px 20px; margin: 20px 0; border-radius: 2px;
    border: 1px solid var(--border-light);
  }
  .cost-summary-row { display: flex; justify-content: space-between; align-items: baseline; }
  .cost-summary-row + .cost-summary-row { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .cost-summary-label { font-size: 11px; color: var(--text-light); }
  .cost-summary-value { font-size: 11px; font-weight: 600; color: var(--dark); }
  .cost-summary-note { font-size: 10px; color: var(--text-light); font-style: italic; }

  /* Terms sections */
  .terms-section { margin-bottom: 18px; }
  .terms-section-heading {
    font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;
    color: var(--text); margin-bottom: 14px; padding-bottom: 7px;
    border-bottom: 1.5px solid var(--dark);
  }
  .terms-list { padding-left: 16px; }
  .terms-list li { font-size: 12px; line-height: 1.65; margin-bottom: 3px; color: var(--text); }
  .terms-note {
    font-size: 12px; color: var(--text-light); font-style: italic;
    margin-top: 8px; padding-left: 0; border-left: 2px solid var(--border);
    padding-left: 10px;
  }
  .placeholder-unfilled {
    background: #fff3cd; color: #856404; border-radius: 2px;
    padding: 0 3px; font-weight: 600; font-style: normal;
    outline: 1px dashed #ffc107;
  }
  .third-party-note {
    font-size: 11px; background: var(--cream); border: 1px solid var(--border-light);
    padding: 8px 12px; margin-top: 6px; border-radius: 2px; color: var(--text-light);
  }

  /* No-template message */
  .no-template-msg {
    background: var(--cream-dark); border: 1px dashed var(--border);
    padding: 20px; text-align: center; border-radius: 2px; margin: 20px 0;
    font-size: 13px; color: var(--text-light);
  }
  .no-template-msg strong { display: block; font-size: 14px; color: var(--text); margin-bottom: 4px; }

  /* Signature / Confirmation section */
  .signature-section {
    margin-top: 32px; padding-top: 24px; border-top: 1.5px solid var(--dark);
  }
  .signature-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--dark); margin-bottom: 16px;
  }
  .signature-services-list { margin-bottom: 20px; }
  .signature-service-item {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 11px; color: var(--text);
  }
  .signature-service-item input[type="checkbox"] {
    width: 13px; height: 13px; accent-color: var(--dark);
  }
  .signature-lines { margin-top: 28px; }
  .signature-line-group { margin-bottom: 24px; }
  .signature-line {
    border-bottom: 1px solid var(--dark);
    padding-bottom: 2px; margin-bottom: 4px; min-height: 28px;
  }
  .signature-line-label { font-size: 10px; color: var(--text-light); letter-spacing: 0.3px; }
  .signature-validity {
    margin-top: 20px; font-size: 11px; color: var(--text-light);
    font-style: italic; text-align: center;
  }

  /* Footer */
  .doc-footer {
    background: var(--cream); color: var(--text-light);
    padding: 14px 40px; display: flex; align-items: center;
    justify-content: space-between; font-size: 10px;
    border-top: 1px solid var(--border-light);
  }
  .doc-footer-logo { display: flex; align-items: center; }
  .doc-footer-contact { display: flex; flex-direction: column; gap: 2px; text-align: right; font-size: 10px; color: var(--text-light); line-height: 1.5; }

  /* Advisor management */
  .advisor-wrap { position: relative; }
  .advisor-input-row { display: flex; gap: 6px; align-items: center; }
  .advisor-input-row .field-input { flex: 1; }
  .advisor-add-btn {
    padding: 8px 10px; background: #000000; border: none;
    color: #ffffff; font-size: 16px; line-height: 1; cursor: pointer;
    border-radius: 3px; flex-shrink: 0; transition: opacity 0.15s;
  }
  .advisor-add-btn:hover { opacity: 0.8; }
  .advisor-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; min-height: 0; }
  .advisor-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px; background: rgba(7,18,16,0.08);
    border: 1px solid rgba(7,18,16,0.15); border-radius: 12px;
    font-size: 11px; color: var(--dark); cursor: pointer;
    transition: all 0.1s;
  }
  .advisor-chip:hover { background: rgba(7,18,16,0.04); }
  .advisor-chip.active { background: var(--dark); color: var(--yellow); border-color: var(--dark); }
  .advisor-chip-remove {
    font-size: 13px; line-height: 1; color: inherit; opacity: 0.5;
    cursor: pointer; border: none; background: none; padding: 0 0 0 2px;
    font-family: var(--font);
  }
  .advisor-chip-remove:hover { opacity: 1; }

  /* ── PRINT / PDF ── */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    #sidebar, #topbar, #email-panel { display: none !important; }
    #app { display: block; }
    #main { display: block; padding: 0; }
    #proposal-area { padding: 0; background: white; }
    #proposal-doc { box-shadow: none; max-width: 100%; margin: 0; }
    #proposal-empty { display: none !important; }
    body { background: white; margin: 0; padding: 0; }
    .fee-table tbody tr:hover td { border-top: none !important; border-bottom: 1px solid var(--border-light) !important; border-left: none !important; border-right: none !important; }
    #edit-mode-banner { display: none !important; }
    #proposal-doc { outline: none !important; }

    /* Page break control — prevents content from being cut mid-element */
    .doc-section-header { break-after: avoid; page-break-after: avoid; }
    .doc-section { break-inside: auto; page-break-inside: auto; }
    .doc-section-subheader { break-after: avoid; page-break-after: avoid; }
    .macro-category { break-inside: avoid; page-break-inside: avoid; }
    .terms-section { break-inside: avoid; page-break-inside: avoid; }
    .signature-section { break-inside: avoid; page-break-inside: avoid; }
    .fee-table { break-inside: avoid; page-break-inside: avoid; }
    .fee-table tr { break-inside: avoid; page-break-inside: avoid; }
    .summary-section { break-inside: avoid; page-break-inside: avoid; }
    .clause-section { break-inside: auto; page-break-inside: auto; }
    .clause-section .clause-item { break-inside: avoid; page-break-inside: avoid; }
    h3, h4 { break-after: avoid; page-break-after: avoid; }
    p, li { orphans: 3; widows: 3; }

    /* 0.5 inch margins, no browser headers/footers */
    @page { margin: 12.7mm 10mm; size: A4; }
    @page :first { margin-top: 6mm; }
    title { display: none; }
  }

  /* ── Gender toggle ── */
  .gender-toggle { display: flex; gap: 4px; }
  .gender-btn {
    flex: 1; padding: 5px 4px; border: 1px solid rgba(7,18,16,0.2);
    background: transparent; color: rgba(7,18,16,0.5);
    font-family: var(--font); font-size: 10px; font-weight: 600;
    letter-spacing: 0.3px; cursor: pointer; border-radius: 3px;
    transition: all 0.15s;
  }
  .gender-btn:hover { border-color: rgba(7,18,16,0.5); color: var(--dark); }
  .gender-btn.active { background: var(--dark); border-color: var(--dark); color: var(--yellow); }

  /* ── Price override inline ── */
  .price-override-row {
    display: flex; align-items: center; gap: 4px; margin-top: 3px;
  }
  .price-override-input {
    width: 90px; padding: 3px 6px;
    background: rgba(226,255,0,0.12); border: 1px solid rgba(7,18,16,0.18);
    border-radius: 2px; font-family: var(--font); font-size: 10px;
    color: var(--dark); outline: none; text-align: right;
  }
  .price-override-input:focus { border-color: rgba(7,18,16,0.4); }
  .price-override-label { font-size: 9px; color: rgba(7,18,16,0.4); }

  .reestru-section-title {
    font-size: 11px; font-weight: 600; color: var(--dark);
    padding: 8px 10px 4px 10px; display: block;
  }
  .scope-section-divider {
    font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: rgba(7,18,16,0.35); padding: 8px 12px 3px 28px;
    border-top: 1px solid rgba(7,18,16,0.08); margin-top: 4px;
  }

  /* ── Bespoke / custom scope controls ── */
  .bespoke-area { padding: 4px 10px 6px 28px; }
  .bespoke-toggle {
    font-size: 9px; font-weight: 600; color: rgba(7,18,16,0.45); letter-spacing: 0.3px;
    background: none; border: none; cursor: pointer; padding: 2px 0; display: flex;
    align-items: center; gap: 4px;
  }
  .bespoke-toggle:hover { color: var(--dark); }
  .bespoke-toggle.active { color: var(--dark); }
  .bespoke-textarea {
    width: 100%; box-sizing: border-box; margin-top: 4px;
    padding: 5px 7px; font-size: 10px; font-family: var(--font);
    color: var(--dark); background: rgba(255,255,255,0.7);
    border: 1px solid rgba(7,18,16,0.18); border-radius: 4px;
    resize: vertical; min-height: 48px; outline: none; line-height: 1.5;
  }
  .bespoke-textarea:focus { border-color: rgba(7,18,16,0.4); }
  .bespoke-label { font-size: 9px; color: rgba(7,18,16,0.4); margin-top: 6px; margin-bottom: 2px; display: block; }
  .bespoke-override-badge {
    font-size: 8px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    background: rgba(226,255,0,0.35); color: var(--dark);
    border-radius: 3px; padding: 1px 5px; margin-left: 4px;
  }
  /* Custom item rows */
  .custom-item-row {
    border: 1px dashed rgba(7,18,16,0.2); border-radius: 6px;
    margin: 4px 10px 4px 10px; padding: 8px 10px;
    background: rgba(255,255,255,0.5);
  }
  .custom-item-name {
    width: 100%; box-sizing: border-box; padding: 4px 6px;
    font-size: 11px; font-family: var(--font); color: var(--dark);
    background: var(--cream); border: 1px solid rgba(7,18,16,0.18);
    border-radius: 4px; outline: none; margin-bottom: 4px;
  }
  .custom-item-name:focus { border-color: rgba(7,18,16,0.4); }
  .btn-add-custom {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; color: rgba(7,18,16,0.5);
    background: none; border: 1px dashed rgba(7,18,16,0.2);
    border-radius: 5px; padding: 6px 10px; cursor: pointer;
    margin: 6px 10px; width: calc(100% - 20px); justify-content: center;
  }
  .btn-add-custom:hover { color: var(--dark); border-color: rgba(7,18,16,0.4); background: rgba(255,255,255,0.4); }
  .btn-remove-custom {
    float: right; background: none; border: none; cursor: pointer;
    color: rgba(7,18,16,0.3); font-size: 13px; line-height: 1; padding: 0;
  }
  .btn-remove-custom:hover { color: #c0392b; }

  /* ── Quantity input ── */
  .qty-row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .qty-label { font-size: 9px; color: rgba(7,18,16,0.45); font-weight: 600; letter-spacing: 0.3px; }
  .qty-input {
    width: 40px; padding: 3px 4px; text-align: center;
    background: rgba(7,18,16,0.04); border: 1px solid rgba(7,18,16,0.18);
    border-radius: 2px; font-family: var(--font); font-size: 11px; font-weight: 600;
    color: var(--dark); outline: none;
  }
  .qty-input:focus { border-color: rgba(7,18,16,0.4); }

/* ── Password Gate ── */
#pw-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
}
#pw-gate.hidden { display: none; }
.pw-box {
  background: #fff; border: 1px solid rgba(7,18,16,0.12);
  border-radius: 12px; padding: 40px 36px 32px;
  width: 340px; text-align: center;
  box-shadow: 0 8px 32px rgba(7,18,16,0.10);
}
.pw-logo { height: 36px; margin-bottom: 24px; }
.pw-title { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
.pw-sub { font-size: 11px; color: var(--text-light); margin-bottom: 20px; }
.pw-field {
  position: relative; margin-bottom: 12px;
}
.pw-field input {
  width: 100%; box-sizing: border-box;
  padding: 10px 40px 10px 12px;
  border: 1px solid rgba(7,18,16,0.18); border-radius: 8px;
  font-size: 13px; font-family: var(--font);
  outline: none; background: var(--cream);
  letter-spacing: 0.04em;
}
.pw-field input:focus { border-color: var(--dark); }
.pw-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-light); font-size: 15px; padding: 2px;
  line-height: 1;
}
.pw-toggle:hover { color: var(--dark); }
.pw-btn {
  width: 100%; padding: 10px; border: none; border-radius: 8px;
  background: var(--dark); color: #fff;
  font-size: 13px; font-weight: 600; font-family: var(--font);
  cursor: pointer; margin-top: 4px;
}
.pw-btn:hover { opacity: 0.85; }
.pw-error {
  font-size: 11px; color: #c0392b;
  margin-top: 8px; min-height: 16px;
}
</style>
</head>
<body>
<!-- ── Password Gate Overlay ── -->
<div id="pw-gate">
  <div class="pw-box">
    <img class="pw-logo" id="pw-logo" alt="FGC.">
    <div class="pw-title">Proposal Generator</div>
    <div class="pw-sub">Digite a senha para acessar</div>
    <div class="pw-field">
      <input type="password" id="pw-input" placeholder="Senha" onkeydown="if(event.key==='Enter')checkPW()">
      <button class="pw-toggle" onclick="togglePWVisibility()" title="Mostrar/ocultar senha">👁</button>
    </div>
    <button class="pw-btn" onclick="checkPW()">Entrar</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>
<div id="app">

<!-- ═══════════════════════════════════════════════

═══════════════════════════════════════════════ -->
<div id="email-panel">

  </div>

    <!-- Language follows proposal language automatically -->
    <textarea id="email-textarea" class="email-output" spellcheck="false"></textarea>
    <button class="email-copy-btn" onclick="copyEmail()">Copy to Clipboard</button>
  </div>
</div>

function setGender(g) {
  gender = g;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.gender-btn[onclick="setGender('${g}')"]`).classList.add('active');
  debouncedUpdate();
}
function getSalutation() {
  const L = T[lang];
  if (gender === 'M') return L.salutationM;
  if (gender === 'F') return L.salutationF;
  return L.salutationNeutral;
}
// ── Bespoke scope functions ──
function setScopeNote(key, val) {
  if (val.trim()) scopeNotes[key] = val;
  else delete scopeNotes[key];
}
function activateScopeOverride(key) {
  // Pre-fill with standard scope text if not already overridden
  if (scopeOverrides[key] === undefined) {
    const m = FGC_CONFIG.terms[lang] && FGC_CONFIG.terms[lang][key];
    scopeOverrides[key] = m ? m.items.join('\n\n') : '';
  }
  renderServicePicker();
}
function deactivateScopeOverride(key) {
  delete scopeOverrides[key];
  renderServicePicker();
}
function setScopeOverride(key, val) {
  scopeOverrides[key] = val;
}
function addReestruEntry() {
  reestruEntries.push({ label: '', companyName: '', desc: '', extraBullets: '', price: '', qty: 1 });
  renderServicePicker();
  debouncedUpdate();
}
function removeReestruEntry(i) {
  reestruEntries.splice(i, 1);
  if (reestruEntries.length === 0) reestruEntries = [{ label: '', companyName: '', desc: '', extraBullets: '', price: '', qty: 1 }];
  renderServicePicker();
  debouncedUpdate();
}
function setReestruField(i, field, val) {
  if (field === 'price') reestruEntries[i].price = val === '' ? '' : Number(val);
  else if (field === 'qty') reestruEntries[i].qty = Math.max(1, parseInt(val)||1);
  else reestruEntries[i][field] = val;
  debouncedUpdate();
}
function addCustomReestruItem() {
  customReestruItems.push({ id: ++_customIdSeq, name: '', price: null, scope: '', showScope: false });
  renderServicePicker();
}
function removeCustomReestruItem(id) {
  customReestruItems = customReestruItems.filter(it => it.id !== id);
  renderServicePicker();
}
function updateCustomReestruItem(id, field, val) {
  const it = customReestruItems.find(c => c.id === id);
  if (!it) return;
  if (field === 'price') {
    const n = parseFloat(val);
    it.price = (!isNaN(n) && n >= 0) ? n : null;
  } else if (field === 'showScope') {
    it.showScope = val;
  } else {
    it[field] = val;
  }
  if (field !== 'showScope') {
    debouncedUpdate();
  }
}

function setPriceOverride(key, val) {
  const num = parseFloat(val);
  if (!isNaN(num) && num >= 0) priceOverrides[key] = num;
  else delete priceOverrides[key];
  debouncedUpdate();
}
function getPrice(key, defaultPrice) {
  if (priceOverrides[key] !== undefined) return priceOverrides[key];
  return defaultPrice;
}
function setQty(key, val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 1) qty[key] = n;
  else qty[key] = 1;
  debouncedUpdate();
}
function getQty(key) { return qty[key] || 1; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  renderUI();
}
function tl(key) { return T[lang][key] || T['pt'][key] || key; }

function renderUI() {
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.getAttribute('data-key');
    if (T[lang][k]) el.textContent = T[lang][k];
  });
  renderServicePicker();
  updateTopbar();
}

    || (state.customTransfer && customTransfers.some(t => t.label.trim()))
    || (state.customAccounting && customAccounting.some(a => a.label.trim()))

function renderServicePicker() {
  const container = document.getElementById('service-picker');

  SERVICE_DEFS.forEach((catDef, ci) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'service-category';
    const isOpen = true;

    let itemsHTML = '';
    if (catDef.subcats) {
      // Render with PIC/US sub-category labels
      catDef.subcats.forEach(sc => {
        itemsHTML += `<div class="service-subcat-label">${tl(sc.label)}</div>`;
        itemsHTML += sc.items.map(svc => buildServiceToggle(svc)).join('');

      itemsHTML = catDef.items.map(svc => buildServiceToggle(svc)).join('');

      <div class="service-cat-header" onclick="toggleCat(${ci})">

function toggleCat(ci) {
  const items = document.getElementById(`cat-items-${ci}`);
  const arrow = items.previousElementSibling.querySelector('.service-cat-arrow');
  const isOpen = items.classList.contains('open');
  items.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function toggleService(key, val) {
  state[key] = val;
  if (!val) { delete priceOverrides[key]; delete qty[key]; }
  // Mutual exclusion: FS <-> FS 3rd party, TR <-> TR 3rd party
  if (val) {
    if (key === 'fs') state.fs3rd = false;
    if (key === 'fs3rd') state.fs = false;
    if (key === 'tr') state.tr3rd = false;
    if (key === 'tr3rd') state.tr = false;
  }
  // Auto-toggle dissolution tax services
  if (key === 'dissolucaoFL') state.dissolucaoFLTR = val;
  if (key === 'dissolucaoDE') state.dissolucaoDEFS = val;
  // (reestru is now a standalone toggle — no sub-keys)
  // (AFR is no longer auto-selected when BVI is chosen — user selects manually)
  renderServicePicker();
  renderTransferSub();
  renderAlerts();
  debouncedUpdate();
}

function renderTransferSub() {
  const existing = document.querySelectorAll('.transfer-sub-options');
  existing.forEach(e => e.remove());

  const hasAnyTransfer = ALL_TRANS_KEYS.some(k => state[k]);
  if (!hasAnyTransfer) return;

  // Find the transfer category container
  SERVICE_DEFS.forEach((catDef, ci) => {
    if (catDef.cat !== 'catTransfer') return;
    const itemsEl = document.getElementById(`cat-items-${ci}`);
    if (!itemsEl) return;
    const subDiv = document.createElement('div');
    subDiv.className = 'transfer-sub-options';
    subDiv.style.cssText = 'padding: 6px 10px 4px 28px; border-top: 1px solid rgba(7,18,16,0.1); margin-top: 4px;';
    subDiv.innerHTML = `
      <div style="font-size:10px;color:rgba(7,18,16,0.45);margin-bottom:6px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;">
        ${tl('lblTransferPriorService')}

      <label class="sub-option">
        <input type="checkbox" ${state.transFS?'checked':''}

      </label>
      ${state.transFS ? `<div class="price-override-row" style="margin-left:20px;margin-bottom:4px;">
        <span class="price-override-label">USD</span>
        <input type="number" class="price-override-input"
          placeholder="${FGC_CONFIG.services.transFS.price}"
          value="${priceOverrides['transFS'] !== undefined ? priceOverrides['transFS'] : ''}"

function renderAlerts() {
  const area = document.getElementById('sidebar-alert-area');
  area.innerHTML = '';
  if (hasStandaloneOnly() && hasRegularServices()) {
    area.innerHTML += `<div class="sidebar-alert">${tl('alertStandalone')}</div>`;
  }
  // Warn about incompatible accounting + entity selections
  const hasPIC = PIC_FORM_KEYS.some(k => state[k]) || PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k]);
  const hasUS  = US_FORM_KEYS.some(k => state[k])  || US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]) || (state.customUS && customStates.some(cs => cs.name.trim()));
  const fsWithoutPIC = (state.fs || state.fs3rd) && !hasPIC && hasUS;
  const fsWithoutAny = (state.fs || state.fs3rd) && !hasPIC && !hasUS;
  const trWithoutUS  = (state.tr || state.tr3rd) && !hasUS;
  if (fsWithoutPIC) {
    const msgs = {
      pt: 'DF/AFR selecionado sem entidade PIC. Será incluído na proposta para a estrutura US selecionada.',
      es: 'DF/AFR seleccionado sin entidad PIC. Se incluirá en la propuesta para la estructura US seleccionada.',
      en: 'FS/AFR selected without a PIC entity. It will be included in the proposal for the selected US structure.',
    };
    area.innerHTML += `<div class="sidebar-alert">${msgs[lang]}</div>`;
  }
  if (fsWithoutAny) {
    const msgs = {
      pt: 'DF/AFR selecionado sem nenhuma entidade. Selecione uma entidade PIC ou US para incluir na proposta.',
      es: 'DF/AFR seleccionado sin ninguna entidad. Seleccione una entidad PIC o US para incluir en la propuesta.',
      en: 'FS/AFR selected without any entity. Select a PIC or US entity to include it in the proposal.',
    };
    area.innerHTML += `<div class="sidebar-alert">${msgs[lang]}</div>`;
  }
  if (trWithoutUS) {
    const msgs = {
      pt: 'Tax Return aplica-se apenas a entidades US (FL, DE, NY, SD). Não será incluído na proposta sem uma entidade US selecionada.',
      es: 'Tax Return aplica solo a entidades US (FL, DE, NY, SD). No se incluirá en la propuesta sin una entidad US seleccionada.',
      en: 'Tax Return applies only to US entities (FL, DE, NY, SD). Will not be included in the proposal without a US entity selected.',
    };
    area.innerHTML += `<div class="sidebar-alert">${msgs[lang]}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════
//  DEBOUNCE
// ═══════════════════════════════════════════════════════════════════
let debTimer;
// Track the last triva mode used so live-preview re-generation uses the same branding.
// null = no proposal generated yet; undefined/true = a proposal is live (matches triva arg).
let _lastTrivaMode = null;
// When true, debouncedUpdate skips re-rendering so manual edits are preserved.
let _editMode = false;

function debouncedUpdate() {
  clearTimeout(debTimer);
  debTimer = setTimeout(function() {
    updateTopbar();
    // If a proposal is already displayed, re-generate it so prices/qty update in real time
    // Skip if edit mode is active (user may have manually edited the proposal)
    const docEl = document.getElementById('proposal-doc');
    if (docEl && docEl.style.display !== 'none' && _lastTrivaMode !== null && !_editMode) {
      generateProposal(_lastTrivaMode);
    }
  }, 150);
}

function toggleEditMode() {
  _editMode = !_editMode;
  const docEl = document.getElementById('proposal-doc');
  const btn = document.getElementById('btn-edit-proposal');
  const banner = document.getElementById('edit-mode-banner');
  if (!docEl) return;
  const _labels = {
    edit:  { pt: '✏ Editar', es: '✏ Editar', en: '✏ Edit' },
    saved: { pt: '✓ Salvo',  es: '✓ Guardado', en: '✓ Saved' },
    banner: {
      pt: 'Modo de edição ativo — alterações manuais serão perdidas ao gerar nova proposta',
      es: 'Modo de edición activo — los cambios manuales se perderán al generar una nueva propuesta',
      en: 'Edit mode active — manual changes will be lost when a new proposal is generated',
    },
  };
  if (_editMode) {
    docEl.contentEditable = 'true';
    docEl.style.outline = '2px solid var(--dust, #9AB4B0)';
    if (btn) { btn.textContent = _labels.saved[lang] || _labels.saved.pt; btn.classList.add('active'); }
    if (banner) { banner.textContent = _labels.banner[lang] || _labels.banner.pt; banner.style.display = ''; }
  } else {
    docEl.contentEditable = 'false';
    docEl.style.outline = '';
    if (btn) { btn.textContent = _labels.edit[lang] || _labels.edit.pt; btn.classList.remove('active'); }
    if (banner) banner.style.display = 'none';
  }
}

function updateTopbar() {
  const client = document.getElementById('f-client').value.trim();
  const info = document.getElementById('topbar-info');
  if (client) info.textContent = client;
  else info.textContent = '';
  // Update edit button label to match current language (if proposal is visible)
  const editBtn = document.getElementById('btn-edit-proposal');
  if (editBtn && editBtn.style.display !== 'none') {
    const _editLabels = { pt: '✏ Editar', es: '✏ Editar', en: '✏ Edit' };
    const _savedLabels = { pt: '✓ Salvo', es: '✓ Guardado', en: '✓ Saved' };
    editBtn.textContent = _editMode ? (_savedLabels[lang] || '✓ Salvo') : (_editLabels[lang] || '✏ Editar');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  PROPOSAL GENERATION
// ═══════════════════════════════════════════════════════════════════
function generateProposal(triva) {
  // Track which branding mode was last used so debouncedUpdate() can re-generate correctly.
  // Store false (not undefined) for the regular case so null stays unambiguous as "no proposal yet".
  _lastTrivaMode = triva ? true : false;
  const client = document.getElementById('f-client').value.trim() || '';
  const careOf = (document.getElementById('f-careof')?.value || '').trim();
  const extraLine = (document.getElementById('f-extra')?.value || '').trim();
  const clientEmail = document.getElementById('f-email')?.value?.trim() || '';
  const advisor= document.getElementById('f-advisor').value.trim();
  const rawDate= document.getElementById('f-date').value;
  if (advisor) { saveAdvisor(advisor); renderAdvisorChips(); }
  const dateStr = rawDate ? new Date(rawDate + 'T12:00:00').toLocaleDateString(
    lang === 'pt' ? 'pt-BR' : lang === 'es' ? 'es-MX' : 'en-US',
    { day: '2-digit', month: 'long', year: 'numeric' }
  ) : new Date().toLocaleDateString(
    lang === 'pt' ? 'pt-BR' : lang === 'es' ? 'es-MX' : 'en-US',
    { day: '2-digit', month: 'long', year: 'numeric' }
  );

  const L = T[lang];

  // ── Detect what is selected ──
  const hasPICForm    = PIC_FORM_KEYS.some(k => state[k]) || (state.customOffshore && customOffshore.some(o => o.label.trim()));
  const hasUSForm     = US_FORM_KEYS.some(k => state[k]) || (state.customUS && customStates.some(cs => cs.name.trim()));
  const hasFormation  = hasPICForm || hasUSForm || state.trust;
  const hasPICTrans   = PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k]);
  const hasUSTrans    = US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]);
  const hasCustomTrans = state.customTransfer && customTransfers.some(t => t.label.trim());
  const hasTransfer   = hasPICTrans || hasUSTrans || hasCustomTrans;
  const hasSuccession = state.will;
  // FS/AFR is primary for PIC entities but can be manually applied to US structures; TR is US-only
  const hasPICEntity  = hasPICForm || hasPICTrans;
  const hasUSEntity   = hasUSForm  || hasUSTrans;
  const hasAccounting = (state.fs && (hasPICEntity || hasUSEntity)) || (state.tr && (hasPICEntity || hasUSEntity)) || (state.afr && hasPICEntity);
  const has3rdPartyFS = state.fs3rd && (hasPICEntity || hasUSEntity);
  const has3rdPartyTR = state.tr3rd && (hasPICEntity || hasUSEntity);
  const hasMaint      = hasFormation || hasTransfer;
  const hasApostila   = state.apostila;
  const hasMailing    = state.mailing;
  const hasReestru    = state.reestru;
const hasCustomDissol = state.customDissolution && customDissolutions.some(d => d.label.trim());
const hasCustomAcct   = state.customAccounting  && customAccounting.some(a => a.label.trim());
const hasStandalone = state.dcbe || state.dissolucaoBVI || state.dissolucaoBahamas || state.dissolucaoCayman || state.dissolucaoNevis || state.dissolucaoFL || state.dissolucaoDE || state.dissolucaoNY || state.dissolucaoSD || state.dissolucaoWI || state.dissolucaoMN || state.dissolucaoFLTR || state.dissolucaoDEFS || hasReestru || hasCustomDissol;
  const hasNoTemplate = state.dcbe;
  const hasDissolution = state.dissolucaoBVI || state.dissolucaoBahamas || state.dissolucaoCayman || state.dissolucaoNevis || state.dissolucaoFL || state.dissolucaoDE || state.dissolucaoNY || state.dissolucaoSD || state.dissolucaoWI || state.dissolucaoMN || hasCustomDissol;
  const isDissolutionOnly = hasDissolution && !hasFormation && !hasTransfer && !hasSuccession && !hasAccounting && !hasApostila && !hasMailing && !has3rdPartyFS && !has3rdPartyTR && !state.dcbe;
  const hasAnyService = hasFormation || hasTransfer || hasSuccession || hasAccounting || hasApostila || hasMailing || hasStandalone || has3rdPartyFS || has3rdPartyTR || hasCustomAcct;

  if (!hasAnyService) {
    alert(lang==='pt'?'Selecione pelo menos um serviço.':lang==='es'?'Seleccione al menos un servicio.':'Please select at least one service.');
    return;
  }

  // ── Build item arrays ──
  // Helper to get term title from FGC_CONFIG
  function termTitle(key) { return (FGC_CONFIG.terms[lang] && FGC_CONFIG.terms[lang][key]) ? FGC_CONFIG.terms[lang][key].title : key; }

  // Section I items (formation + transfer, one-time fees)
  let sec1Items = [];
  // PIC formation (with qty support)
  if (state.bvi)      { const q=getQty('bvi');      sec1Items.push({ key:'bvi',      label: (q>1?q+'x ':'')+termTitle('bvi'),      amount: getPrice('bvi', FGC_CONFIG.services.bvi.price)*q,          pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.bahamas)  { const q=getQty('bahamas');  sec1Items.push({ key:'bahamas',  label: (q>1?q+'x ':'')+termTitle('bahamas'),  amount: getPrice('bahamas', FGC_CONFIG.services.bahamas.price)*q,   pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.cayman)   { const q=getQty('cayman');   sec1Items.push({ key:'cayman',   label: (q>1?q+'x ':'')+termTitle('cayman'),   amount: getPrice('cayman', FGC_CONFIG.services.cayman.price)*q,     pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.nevis)    { const q=getQty('nevis');    sec1Items.push({ key:'nevis',    label: (q>1?q+'x ':'')+termTitle('nevis'),    amount: getPrice('nevis', FGC_CONFIG.services.nevis.price)*q,       pay: L.payOnAcceptance, group:'pic', qty:q }); }
  // US formation (with qty support)
  if (state.fl)       { const q=getQty('fl');       sec1Items.push({ key:'fl',       label: (q>1?q+'x ':'')+termTitle('fl'),       amount: getPrice('fl', FGC_CONFIG.services.fl.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.de)       { const q=getQty('de');       sec1Items.push({ key:'de',       label: (q>1?q+'x ':'')+termTitle('de'),       amount: getPrice('de', FGC_CONFIG.services.de.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.ny)       { const q=getQty('ny');       sec1Items.push({ key:'ny',       label: (q>1?q+'x ':'')+termTitle('ny'),       amount: getPrice('ny', FGC_CONFIG.services.ny.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.sd)       { const q=getQty('sd');       sec1Items.push({ key:'sd',       label: (q>1?q+'x ':'')+termTitle('sd'),       amount: getPrice('sd', FGC_CONFIG.services.sd.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.wi)       { const q=getQty('wi');       sec1Items.push({ key:'wi',       label: (q>1?q+'x ':'')+termTitle('wi'),       amount: getPrice('wi', FGC_CONFIG.services.wi.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.mn)       { const q=getQty('mn');       sec1Items.push({ key:'mn',       label: (q>1?q+'x ':'')+termTitle('mn'),       amount: getPrice('mn', FGC_CONFIG.services.mn.price)*q,            pay: L.payOnAcceptance, group:'us', qty:q }); }
  // Trust (optional service, not PIC/US)
  if (state.trust)    { const q=getQty('trust');    sec1Items.push({ key:'trust',    label: (q>1?q+'x ':'')+termTitle('trust'),    amount: getPrice('trust', FGC_CONFIG.services.trust.price)*q,    pay: L.payOnAcceptance, qty:q }); }
  // PIC transfer (with qty + price override support)
  if (state.transBVI)     { const q=getQty('transBVI');     sec1Items.push({ key:'transBVI',     label: (q>1?q+'x ':'')+termTitle('transBVI'),     amount: getPrice('transBVI', FGC_CONFIG.services.transBVI.price)*q,     pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.transBahamas) { const q=getQty('transBahamas'); sec1Items.push({ key:'transBahamas', label: (q>1?q+'x ':'')+termTitle('transBahamas'), amount: getPrice('transBahamas', FGC_CONFIG.services.transBahamas.price)*q, pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.transCayman)  { const q=getQty('transCayman');  sec1Items.push({ key:'transCayman',  label: (q>1?q+'x ':'')+termTitle('transCayman'),  amount: getPrice('transCayman', FGC_CONFIG.services.transCayman.price)*q,  pay: L.payOnAcceptance, group:'pic', qty:q }); }
  if (state.transNevis)   { const q=getQty('transNevis');   sec1Items.push({ key:'transNevis',   label: (q>1?q+'x ':'')+termTitle('transNevis'),   amount: getPrice('transNevis', FGC_CONFIG.services.transNevis.price)*q,   pay: L.payOnAcceptance, group:'pic', qty:q }); }
  // PIC transfer (no agent change — complimentary)
  if (state.transBVIRA)     sec1Items.push({ key:'transBVIRA',     label: termTitle('transBVIRA'),     amount: FGC_CONFIG.services.transBVIRA.price,     pay: L.payOnAcceptance, group:'pic', complimentary: true });
  if (state.transBahamasRA) sec1Items.push({ key:'transBahamasRA', label: termTitle('transBahamasRA'), amount: FGC_CONFIG.services.transBahamasRA.price, pay: L.payOnAcceptance, group:'pic', complimentary: true });
  if (state.transCaymanRA)  sec1Items.push({ key:'transCaymanRA',  label: termTitle('transCaymanRA'),  amount: FGC_CONFIG.services.transCaymanRA.price,  pay: L.payOnAcceptance, group:'pic', complimentary: true });
  if (state.transNevisRA)   sec1Items.push({ key:'transNevisRA',   label: termTitle('transNevisRA'),   amount: FGC_CONFIG.services.transNevisRA.price,   pay: L.payOnAcceptance, group:'pic', complimentary: true });
  // US transfer (with qty + price override support)
  if (state.transFL)  { const q=getQty('transFL');  sec1Items.push({ key:'transFL',  label: (q>1?q+'x ':'')+termTitle('transFL'),  amount: getPrice('transFL', FGC_CONFIG.services.transFL.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transDE)  { const q=getQty('transDE');  sec1Items.push({ key:'transDE',  label: (q>1?q+'x ':'')+termTitle('transDE'),  amount: getPrice('transDE', FGC_CONFIG.services.transDE.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transNY)  { const q=getQty('transNY');  sec1Items.push({ key:'transNY',  label: (q>1?q+'x ':'')+termTitle('transNY'),  amount: getPrice('transNY', FGC_CONFIG.services.transNY.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transSD)  { const q=getQty('transSD');  sec1Items.push({ key:'transSD',  label: (q>1?q+'x ':'')+termTitle('transSD'),  amount: getPrice('transSD', FGC_CONFIG.services.transSD.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transWI)  { const q=getQty('transWI');  sec1Items.push({ key:'transWI',  label: (q>1?q+'x ':'')+termTitle('transWI'),  amount: getPrice('transWI', FGC_CONFIG.services.transWI.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  if (state.transMN)  { const q=getQty('transMN');  sec1Items.push({ key:'transMN',  label: (q>1?q+'x ':'')+termTitle('transMN'),  amount: getPrice('transMN', FGC_CONFIG.services.transMN.price)*q,  pay: L.payOnAcceptance, group:'us', qty:q }); }
  // US transfer (no agent change — complimentary)
  if (state.transFLRA) sec1Items.push({ key:'transFLRA', label: termTitle('transFLRA'), amount: FGC_CONFIG.services.transFLRA.price, pay: L.payOnAcceptance, group:'us', complimentary: true });
  if (state.transDERA) sec1Items.push({ key:'transDERA', label: termTitle('transDERA'), amount: FGC_CONFIG.services.transDERA.price, pay: L.payOnAcceptance, group:'us', complimentary: true });
  // Apostila
  if (state.apostila) { const q=getQty('apostila'); sec1Items.push({ key:'apostila', label: (q>1?q+'x ':'')+termTitle('apostila'), amount: getPrice('apostila', FGC_CONFIG.services.apostila.price)*q, pay: L.payOnAcceptance, qty:q }); }

  // Custom US states
  if (state.customUS) {
    customStates.forEach((cs) => {
      if (!cs.name.trim()) return;
      const q = Math.max(cs.qty || 1, 1);
      const unit = (cs.price !== '' && cs.price != null) ? Number(cs.price) : null;
      sec1Items.push({ key:'customUS', label: (q>1?q+'x ':'')+cs.name.trim()+' LLC', amount: unit !== null ? unit*q : null, pay: L.payOnAcceptance, group:'us', qty:q, stateName: cs.name.trim() });
    });
  }

  // Custom offshore formation
  if (state.customOffshore) {
    customOffshore.forEach((o) => {
      if (!o.label.trim()) return;
      const q = Math.max(o.qty || 1, 1);
      const unit = (o.price !== '' && o.price != null) ? Number(o.price) : null;
      sec1Items.push({ key:'customOffshore', label: (q>1?q+'x ':'')+o.label.trim(), amount: unit !== null ? unit*q : null, pay: L.payOnAcceptance, group:'pic', qty:q, offshoreLabel: o.label.trim(), customScope: o.scope||'' });
    });
  }
  // Custom transfer
  if (state.customTransfer) {
    customTransfers.forEach((t) => {
      if (!t.label.trim()) return;
      const q = Math.max(t.qty || 1, 1);
      const unit = (t.price !== '' && t.price != null) ? Number(t.price) : null;
      sec1Items.push({ key:'customTransfer', label: (q>1?q+'x ':'')+t.label.trim(), amount: unit !== null ? unit*q : null, pay: L.payOnAcceptance, group:'pic', qty:q, customScope: t.scope||'' });
    });
  }

  // Succession section items (Will / Testamento)
  let secSuccItems = [];
  if (state.will) {
    const willQ = getQty('will');
    const willPrice = getPrice('will', FGC_CONFIG.services.bvi.willPrice);
    secSuccItems.push({ key:'will', label: (willQ>1?willQ+'x ':'')+termTitle('will'), amount: willPrice*willQ, pay: L.payOnAcceptance, qty: willQ });
  }

  // Maintenance items (annual entity maintenance)
  let secMaintItems = [];
  // Maintenance for PIC entities (qty auto-multiplied from formation/transfer)
  function maintQty(formKey, transKey, transRAKey) {
    let q = 0;
    if (state[formKey])    q += getQty(formKey);
    if (state[transKey])   q += getQty(transKey);
    if (transRAKey && state[transRAKey]) q += 1;
    return Math.max(q, 0);
  }
  // Helper: maintenance always shows as recurring in the fee table
  function maintPayTerm() {
    return L.payFromYear2;
  }
  // Helper: get maintenance unit price, respecting manual override
  function maintUnitPrice(mk) {
    return (maintPriceOverrides[mk] !== undefined && maintPriceOverrides[mk] !== '')
      ? Number(maintPriceOverrides[mk])
      : FGC_CONFIG.services[mk].price;
  }
  { const q = maintQty('bvi','transBVI','transBVIRA');         if (q>0) secMaintItems.push({ key:'bviMaint',     label: (q>1?q+'x ':'')+termTitle('bviMaint'),     amount: maintUnitPrice('bviMaint')*q,     pay: maintPayTerm(),     group:'pic', qty:q, recurring:true }); }
  { const q = maintQty('bahamas','transBahamas','transBahamasRA'); if (q>0) secMaintItems.push({ key:'bahamasMaint', label: (q>1?q+'x ':'')+termTitle('bahamasMaint'), amount: maintUnitPrice('bahamasMaint')*q, pay: maintPayTerm(), group:'pic', qty:q, recurring:true }); }
  { const q = maintQty('cayman','transCayman','transCaymanRA');  if (q>0) secMaintItems.push({ key:'caymanMaint',  label: (q>1?q+'x ':'')+termTitle('caymanMaint'),  amount: maintUnitPrice('caymanMaint')*q,  pay: maintPayTerm(), group:'pic', qty:q, recurring:true }); }
  { const q = maintQty('nevis','transNevis','transNevisRA');    if (q>0) secMaintItems.push({ key:'nevisMaint',   label: (q>1?q+'x ':'')+termTitle('nevisMaint'),   amount: maintUnitPrice('nevisMaint')*q,   pay: maintPayTerm(), group:'pic', qty:q, recurring:true }); }
  // Maintenance for US entities
  { const q = maintQty('fl','transFL','transFLRA');   if (q>0) secMaintItems.push({ key:'flMaint',      label: (q>1?q+'x ':'')+termTitle('flMaint'),      amount: maintUnitPrice('flMaint')*q,      pay: maintPayTerm(), group:'us', qty:q, recurring:true }); }
  { const q = maintQty('de','transDE','transDERA');  if (q>0) secMaintItems.push({ key:'deMaint',      label: (q>1?q+'x ':'')+termTitle('deMaint'),      amount: maintUnitPrice('deMaint')*q,      pay: maintPayTerm(), group:'us', qty:q, recurring:true }); }
  { const q = maintQty('ny','transNY',null);         if (q>0) secMaintItems.push({ key:'nyMaint',      label: (q>1?q+'x ':'')+termTitle('nyMaint'),      amount: maintUnitPrice('nyMaint')*q,      pay: maintPayTerm(), group:'us', qty:q, recurring:true }); }
  { const q = maintQty('sd','transSD',null);         if (q>0) secMaintItems.push({ key:'sdMaint',      label: (q>1?q+'x ':'')+termTitle('sdMaint'),      amount: maintUnitPrice('sdMaint')*q,      pay: maintPayTerm(), group:'us', qty:q, recurring:true }); }
  { const q = maintQty('wi','transWI',null);         if (q>0) secMaintItems.push({ key:'wiMaint',      label: (q>1?q+'x ':'')+termTitle('wiMaint'),      amount: maintUnitPrice('wiMaint')*q,      pay: maintPayTerm(), group:'us', qty:q, recurring:true }); }
  { const q = maintQty('mn','transMN',null);         if (q>0) secMaintItems.push({ key:'mnMaint',      label: (q>1?q+'x ':'')+termTitle('mnMaint'),      amount: maintUnitPrice('mnMaint')*q,      pay: maintPayTerm(), group:'us', qty:q, recurring:true }); }
  // Custom US state maintenance
  if (state.customUS) {
    customStates.forEach((cs) => {
      if (!cs.name.trim()) return;
      const q = Math.max(cs.qty || 1, 1);
      const unit = (cs.maintPrice !== '' && cs.maintPrice != null) ? Number(cs.maintPrice) : null;
      const _label = (q>1?q+'x ':'')+cs.name.trim()+' LLC – '+(lang==='en'?'Annual Maintenance':lang==='es'?'Mantenimiento Anual':'Manutenção Anual');
      secMaintItems.push({ key:'customUSMaint', label: _label, amount: unit !== null ? unit*q : null, pay: maintPayTerm(), group:'us', recurring:true, qty:q, stateName: cs.name.trim() });
    });
  }
  // Custom offshore maintenance
  if (state.customOffshore) {
    customOffshore.forEach((o) => {
      if (!o.label.trim()) return;
      const q = Math.max(o.qty || 1, 1);
      const unit = (o.maintPrice !== '' && o.maintPrice != null) ? Number(o.maintPrice) : null;
      if (unit === null && o.maintPrice === '') return; // skip if no maint price entered
      const _label = (q>1?q+'x ':'')+o.label.trim()+' – '+(lang==='en'?'Annual Maintenance':lang==='es'?'Mantenimiento Anual':'Manutenção Anual');
      secMaintItems.push({ key:'customOffshoreMaint', label: _label, amount: unit !== null ? unit*q : null, pay: maintPayTerm(), group:'pic', recurring:true, qty:q });
    });
  }
  // Trust maint
  if (state.trust) { const tq=getQty('trust'); secMaintItems.push({ key:'trustMaint', label: (tq>1?tq+'x ':'')+termTitle('trustMaint'), amount: maintUnitPrice('trustMaint')*tq, pay: maintPayTerm(), recurring:true, qty:tq }); }
  // Mailing — cortesia first year when FL is present, no repeated $300 value
  if (hasMailing) {
    const hasFL = state.fl || state.transFL || state.transFLRA;
    const mailingPay = hasFL ? L.payMailingCortesia : L.payFromYear2;
    const mailingQ = getQty('mailing');
    secMaintItems.push({ key:'mailing', label: (mailingQ>1?mailingQ+'x ':'')+termTitle('mailing'), amount: getPrice('mailing', FGC_CONFIG.services.mailing.price)*mailingQ, pay: mailingPay, year2only: true });
  }

  // When "Na Aceitação" is selected: add a current-year row after each recurring maintenance item
  if (state.maintPayTiming !== 'year2') {
    const cyLabel = { pt: ' – Ano corrente', es: ' – Año corriente', en: ' – Current Year' }[lang];
    const augmented = [];
    secMaintItems.forEach(it => {
      augmented.push(it);
      if (it.recurring) {
        augmented.push({ key: it.key + 'CY', label: it.label + cyLabel, amount: it.amount, pay: L.payOnAcceptance, recurring: false, group: it.group, shareRef: true });
      }
    });
    secMaintItems = augmented;
  }

  // Accounting items (separate section)
  // FS/AFR is primary for PIC entities but usable for US structures; TR is US-specific.
  // (hasPICEntity and hasUSEntity already declared above)
  // FS is split into two fee-table rows to match master proposals (DF + AFR)
  const fsLabels = {
    pt: { df: 'Financial Statements (Demonstrações Financeiras)', afr: 'Annual Financial Return (AFR)' },
    es: { df: 'Financial Statements (Estados Financieros)', afr: 'Annual Financial Return (AFR)' },
    en: { df: 'Financial Statements', afr: 'Annual Financial Return (AFR)' },
  };
  const hasBVIEntity = state.bvi || state.transBVI || state.transBVIRA;
  const bviQty = maintQty('bvi','transBVI','transBVIRA');
  const usQty  = maintQty('fl','transFL','transFLRA') + maintQty('de','transDE','transDERA') + maintQty('ny','transNY',null) + maintQty('sd','transSD',null) + maintQty('wi','transWI',null) + maintQty('mn','transMN',null);
  let secAcctItems = [];
  // FS: allow even when only US entities are present (user may manually select FS for US structures)
  if (state.fs && (hasPICEntity || hasUSEntity)) {
    // Use user-set qty if explicitly provided; otherwise derive from entity count
    const fsQtyAuto = hasPICEntity ? Math.max(bviQty, 1) : 1;
    const fsQtyBase = qty['fs'] !== undefined ? qty['fs'] : fsQtyAuto;
    secAcctItems.push({ key:'fs', label: (fsQtyBase>1?fsQtyBase+'x ':'')+fsLabels[lang].df, amount: getPrice('fs', FGC_CONFIG.services.fs.price)*fsQtyBase, pay: L.payFromYear2, group: hasPICEntity ? 'pic' : 'us' });
    // AFR delivery row only for BVI PICs (not Bahamas/Cayman/Nevis), and only when user chose "Com AFR"
    if (hasBVIEntity && state.fsIncludeAFR) {
      secAcctItems.push({ key:'fsAfr', label: (fsQtyBase>1?fsQtyBase+'x ':'')+fsLabels[lang].afr, amount: null, pay: L.payFromYear2, shareRef: true, group:'pic' });
    }
  }
  // FS by third party — include scope item; show price if user entered one
  if (state.fs3rd && (hasPICEntity || hasUSEntity)) {
    const fs3rdQ = qty['fs3rd'] !== undefined ? qty['fs3rd'] : 1;
    const fs3rdPrice = priceOverrides['fs3rd'] !== undefined ? priceOverrides['fs3rd'] * fs3rdQ : null;
    secAcctItems.push({ key:'fs3rd', label: (fs3rdQ>1?fs3rdQ+'x ':'')+{ pt: 'Demonstrações Financeiras por Terceiros', es: 'Estados Financieros por Terceros', en: 'Financial Statements (Third Party)' }[lang], amount: fs3rdPrice, pay: '', group: hasPICEntity ? 'pic' : 'us' });
  }
  if (state.tr && (hasPICEntity || hasUSEntity)) {
    // Use user-set qty if explicitly provided; otherwise derive from entity count
    const trQtyAuto = hasUSEntity ? Math.max(usQty, 1) : Math.max(bviQty, 1);
    const trQtyFinal = qty['tr'] !== undefined ? qty['tr'] : trQtyAuto;
    secAcctItems.push({ key:'tr', label: (trQtyFinal>1?trQtyFinal+'x ':'')+termTitle('tr'), amount: getPrice('tr', FGC_CONFIG.services.tr.price)*trQtyFinal, pay: L.payFromYear2, group: hasUSEntity ? 'us' : 'pic' });
  }
  // TR by third party — include scope item; show price if user entered one
  if (state.tr3rd && (hasPICEntity || hasUSEntity)) {
    const tr3rdQ = qty['tr3rd'] !== undefined ? qty['tr3rd'] : 1;
    const tr3rdPrice = priceOverrides['tr3rd'] !== undefined ? priceOverrides['tr3rd'] * tr3rdQ : null;
    secAcctItems.push({ key:'tr3rd', label: (tr3rdQ>1?tr3rdQ+'x ':'')+{ pt: 'Tax Return por Terceiros', es: 'Tax Return por Terceros', en: 'Tax Return (Third Party)' }[lang], amount: tr3rdPrice, pay: '', group:'us' });
  }
  // AFR standalone (only if FS not selected, and at least one PIC entity exists)
  if (state.afr && !state.fs && hasPICEntity) {
    // Use user-set qty if explicitly provided; otherwise derive from BVI entity count (or 1)
    const afrQtyAuto = Math.max(bviQty, 1);
    const afrQtyFinal = qty['afr'] !== undefined ? qty['afr'] : afrQtyAuto;
    secAcctItems.push({ key:'afr', label: (afrQtyFinal>1?afrQtyFinal+'x ':'')+termTitle('afr'), amount: getPrice('afr', FGC_CONFIG.services.afr.price)*afrQtyFinal, pay: L.payFromYear2, group:'pic' });
  }
  // Prior-year FS (PIC entities; allow for US-only too when user selects it)
  if (state.fsAnterior && (hasPICEntity || hasUSEntity)) {
    const q = getQty('fsAnterior');
    secAcctItems.push({ key:'fsAnterior', label: (q>1?q+'x ':'')+{ pt: 'Financial Statements (Demonstrações Financeiras) – Anos Anteriores', es: 'Financial Statements (Estados Financieros) – Años Anteriores', en: 'Financial Statements – Prior Years' }[lang], amount: getPrice('fsAnterior', FGC_CONFIG.services.fsAnterior.price)*q, pay: L.payOnAcceptance, group: hasPICEntity ? 'pic' : 'us', qty:q });
    // For BVI entities: also show AFR row for prior-year FS
    if (hasBVIEntity) {
      secAcctItems.push({ key:'fsAnteriorAfr', label: (q>1?q+'x ':'')+{ pt: 'Annual Financial Return (AFR) — Anos Anteriores', es: 'Annual Financial Return (AFR) — Años Anteriores', en: 'Annual Financial Return (AFR) — Prior Years' }[lang], amount: null, pay: L.payOnAcceptance, shareRef: true, group:'pic' });
    }
  }
  // Prior-year TR (US entities only)
  if (state.trAnterior && (hasPICEntity || hasUSEntity)) {
    const q = getQty('trAnterior');
    secAcctItems.push({ key:'trAnterior', label: (q>1?q+'x ':'')+{ pt: 'Tax Return (Declaração de Imposto de Renda) – Anos Anteriores', es: 'Tax Return (Declaración de Impuesto a la Renta) – Años Anteriores', en: 'Tax Return – Prior Years' }[lang], amount: getPrice('trAnterior', FGC_CONFIG.services.trAnterior.price)*q, pay: L.payOnAcceptance, group:'us', qty:q });
  }
  // Custom accounting/fiscal services
  if (state.customAccounting) {
    const L2 = T[lang];
    customAccounting.forEach((a) => {
      if (!a.label.trim()) return;
      const q = Math.max(a.qty || 1, 1);
      const unit = (a.price !== '' && a.price != null) ? Number(a.price) : null;
      const payTerm = a.payTerm === 'year2' ? L2.payFromYear2 : L2.payOnAcceptance;
      const recurring = a.payTerm === 'year2';
      secAcctItems.push({ key:'customAccounting', label: (q>1?q+'x ':'')+a.label.trim(), amount: unit !== null ? unit*q : null, pay: payTerm, recurring, qty:q, customScope: a.scope||'' });
    });
  }
  // Transfer prior-year services (declared here, after secAcctItems exists)
  if (state.transFS)
    secAcctItems.push({ key:'priorFS', label: (lang==='en'?'Financial Statements Preparation - Prior Year (FS)':lang==='es'?'Preparación de Estados Financieros - Año Anterior (FS)':'Preparação de Demonstrações Financeiras - Ano Anterior (FS)'), amount: getPrice('transFS', FGC_CONFIG.services.transFS.price), pay: L.payOnAcceptance, group:'pic' });
  if (state.transTR)
    secAcctItems.push({ key:'priorTR', label: (lang==='en'?'Prior Year Tax Return (TR)':lang==='es'?'Tax Return Año Anterior (TR)':'Tax Return Ano Anterior (TR)'), amount: getPrice('transTR', FGC_CONFIG.services.transTR.price), pay: L.payOnAcceptance, group:'us' });

  // Section III (dissolution / standalone)
  let sec3Items = [];
  if (state.dissolucaoBVI)      { const q=getQty('dissolucaoBVI');      sec3Items.push({ key:'dissolucaoBVI',      label: (q>1?q+'x ':'')+termTitle('dissolucaoBVI'),      amount: getPrice('dissolucaoBVI',      FGC_CONFIG.services.dissolucaoBVI.price)*q,      pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoBahamas)  { const q=getQty('dissolucaoBahamas');  sec3Items.push({ key:'dissolucaoBahamas',  label: (q>1?q+'x ':'')+termTitle('dissolucaoBahamas'),  amount: getPrice('dissolucaoBahamas',  FGC_CONFIG.services.dissolucaoBahamas.price)*q,  pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoCayman)   { const q=getQty('dissolucaoCayman');   sec3Items.push({ key:'dissolucaoCayman',   label: (q>1?q+'x ':'')+termTitle('dissolucaoCayman'),   amount: getPrice('dissolucaoCayman',   FGC_CONFIG.services.dissolucaoCayman.price)*q,   pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoNevis)    { const q=getQty('dissolucaoNevis');    sec3Items.push({ key:'dissolucaoNevis',    label: (q>1?q+'x ':'')+termTitle('dissolucaoNevis'),    amount: getPrice('dissolucaoNevis',    FGC_CONFIG.services.dissolucaoNevis.price)*q,    pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoFL)       { const q=getQty('dissolucaoFL');       sec3Items.push({ key:'dissolucaoFL',       label: (q>1?q+'x ':'')+termTitle('dissolucaoFL'),       amount: getPrice('dissolucaoFL',       FGC_CONFIG.services.dissolucaoFL.price)*q,       pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoFLTR)     { const q=getQty('dissolucaoFLTR');     sec3Items.push({ key:'dissolucaoFLTR',     label: (q>1?q+'x ':'')+tl('svcDissolucaoFLTR'),        amount: getPrice('dissolucaoFLTR',     FGC_CONFIG.services.dissolucaoFLTR.price)*q,     pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoDE)       { const q=getQty('dissolucaoDE');       sec3Items.push({ key:'dissolucaoDE',       label: (q>1?q+'x ':'')+termTitle('dissolucaoDE'),       amount: getPrice('dissolucaoDE',       FGC_CONFIG.services.dissolucaoDE.price)*q,       pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoDEFS)     { const q=getQty('dissolucaoDEFS');     sec3Items.push({ key:'dissolucaoDEFS',     label: (q>1?q+'x ':'')+tl('svcDissolucaoDEFS'),        amount: getPrice('dissolucaoDEFS',     FGC_CONFIG.services.dissolucaoDEFS.price)*q,     pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoNY)       { const q=getQty('dissolucaoNY');       sec3Items.push({ key:'dissolucaoNY',       label: (q>1?q+'x ':'')+termTitle('dissolucaoNY'),       amount: getPrice('dissolucaoNY',       FGC_CONFIG.services.dissolucaoNY.price)*q,       pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoSD)       { const q=getQty('dissolucaoSD');       sec3Items.push({ key:'dissolucaoSD',       label: (q>1?q+'x ':'')+termTitle('dissolucaoSD'),       amount: getPrice('dissolucaoSD',       FGC_CONFIG.services.dissolucaoSD.price)*q,       pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoWI)       { const q=getQty('dissolucaoWI');       sec3Items.push({ key:'dissolucaoWI',       label: (q>1?q+'x ':'')+termTitle('dissolucaoWI'),       amount: getPrice('dissolucaoWI',       FGC_CONFIG.services.dissolucaoWI.price)*q,       pay: L.payOnAcceptance, qty:q }); }
  if (state.dissolucaoMN)       { const q=getQty('dissolucaoMN');       sec3Items.push({ key:'dissolucaoMN',       label: (q>1?q+'x ':'')+termTitle('dissolucaoMN'),       amount: getPrice('dissolucaoMN',       FGC_CONFIG.services.dissolucaoMN.price)*q,       pay: L.payOnAcceptance, qty:q }); }
  // Custom dissolution entries
  if (state.customDissolution) {
    customDissolutions.forEach((d) => {
      if (!d.label.trim()) return;
      const q = Math.max(d.qty || 1, 1);
      const unit = (d.price !== '' && d.price != null) ? Number(d.price) : null;
      sec3Items.push({ key:'customDissolution', label: (q>1?q+'x ':'')+d.label.trim(), amount: unit !== null ? unit*q : null, pay: L.payOnAcceptance, qty:q, customScope: d.scope||'' });
    });
  }
  // Restructuring: one entry per company
  if (state.reestru) {
    const _defaultLabel = { pt: 'Reestruturação Societária', es: 'Reestructuración Societaria', en: 'Corporate Restructuring' }[lang];
    reestruEntries.forEach((entry) => {
      const _label = entry.label.trim() || _defaultLabel;
      const _q = Math.max(entry.qty || 1, 1);
      const _unitAmt = (entry.price !== '' && entry.price != null) ? Number(entry.price) : null;
      sec3Items.push({
        key: 'reestru',
        label: (_q > 1 ? _q + 'x ' : '') + _label,
        amount: _unitAmt !== null ? _unitAmt * _q : null,
        pay: L.payOnAcceptance,
        qty: _q,
        reestruCompanyName: entry.companyName,
        reestruDesc: entry.desc,
        reestruExtraBullets: entry.extraBullets,
        reestruLabel: entry.label,
      });
    });
  }

  // ── Dynamic section numbering ──
  const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  // All fee content lives in Section I. Items numbered continuously 1.1, 1.2, 1.3...
  let feeItemSub = 0;
  const hasFeeContent = sec1Items.length > 0 || secSuccItems.length > 0 || secMaintItems.length > 0 || secAcctItems.length > 0 || sec3Items.length > 0;
  const feeSecHeader = 'I. ' + { pt: 'Honorários', es: 'Honorarios', en: 'Fees' }[lang];

  // Sub-labels (shown inside Section I, no Roman numerals)
  const hasSec1Content = sec1Items.length > 0;
  let sec1SubLabel = '';
  if (hasSec1Content) {
    sec1SubLabel = hasFormation && hasTransfer
      ? { pt: 'Constituição e Transferência', es: 'Constitución y Transferencia', en: 'Formation & Transfer' }[lang]
      : hasFormation
        ? { pt: 'Constituição', es: 'Constitución', en: 'Formation' }[lang]
        : { pt: 'Transferência', es: 'Transferencia', en: 'Transfer' }[lang];
    sec1Items.forEach((it) => { it.num = `1.${++feeItemSub}`; });
  }

  let secSuccSubLabel = '';
  if (secSuccItems.length > 0) {
    secSuccSubLabel = L.secSuccessionLabel;
    secSuccItems.forEach((it) => { it.num = `1.${++feeItemSub}`; });
  }

  let secMaintSubLabel = '';
  if (secMaintItems.length > 0) {
    secMaintSubLabel = L.secMaintLabel;
    secMaintItems.forEach((it) => { it.num = `1.${++feeItemSub}`; });
  }

  let secAcctSubLabel = '';
  if (secAcctItems.length > 0) {
    secAcctSubLabel = { pt: 'Contábil e Fiscal', es: 'Contable y Fiscal', en: 'Accounting & Tax' }[lang];
    secAcctItems.forEach((it) => {
      if (!it.shareRef) feeItemSub++;
      it.num = `1.${feeItemSub}`;
    });
  }

  let sec3SubLabel = '';
  if (sec3Items.length > 0) {
    const hasReestruInSec3 = sec3Items.some(i => i.key === 'reestru');
    const hasDissolvInSec3 = sec3Items.some(i => i.key.startsWith('dissolucao'));
    sec3SubLabel = hasReestruInSec3 && hasDissolvInSec3
      ? { pt: 'Dissolução e Reestruturação', es: 'Disolución y Reestructuración', en: 'Dissolution & Restructuring' }[lang]
      : hasReestruInSec3
        ? { pt: 'Reestruturação Societária', es: 'Reestructuración Societaria', en: 'Corporate Restructuring' }[lang]
        : hasDissolvInSec3
          ? { pt: 'Dissolução', es: 'Disolución', en: 'Dissolution' }[lang]
          : L.secOtherLabel;
    sec3Items.forEach((it, i) => { it.num = `1.${++feeItemSub}`; });
  }

  // Scope = II, Not Included = III, T&C = IV
  const secTermsNum = 2;
  const secTermsHeader = 'II. ' + L.secTermsLabel;
  const secNotIncNum = 3;
  const secTCNum = 4;
  const secTCHeader = 'IV. ' + L.secTCLabel;

  // (Per-section subtotals are computed inline in the document assembly)

  // ── Determine proposal type and opening ──
  let propTypeLabel, openingParagraph;

  // Build higher-order service descriptions for opening paragraph
  const hasPICFormation = PIC_FORM_KEYS.some(k => state[k]);
  const hasUSFormation  = US_FORM_KEYS.some(k => state[k]) || (state.customUS && customStates.some(cs => cs.name.trim()));
  const hasPICTransfer  = PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k]);
  const hasUSTransfer   = US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]);

  const serviceDescriptions = [];
  const O = FGC_CONFIG.opening[lang];

  if (hasPICFormation)    serviceDescriptions.push(O.descFormationPIC);
  if (hasUSFormation)     serviceDescriptions.push(O.descFormationUS);
  if (hasPICTransfer)     serviceDescriptions.push(O.descTransferPIC);
  if (hasUSTransfer)      serviceDescriptions.push(O.descTransferUS);
  if (state.trust)        serviceDescriptions.push(O.descTrust);
  if (hasSuccession)      serviceDescriptions.push(O.descSuccession);
  if (state.dissolucaoFL) serviceDescriptions.push(O.descDissolutionFL);
  if (state.dissolucaoDE) serviceDescriptions.push(O.descDissolutionDE);
  if (state.reestru) serviceDescriptions.push({ pt: 'reestruturação societária', es: 'reestructuración societaria', en: 'corporate restructuring' }[lang]);

  // Join with commas; only "and" before the last item
  let serviceStr = '';
  if (serviceDescriptions.length === 0) {
    serviceStr = '';
  } else if (serviceDescriptions.length === 1) {
    serviceStr = serviceDescriptions[0];
  } else if (serviceDescriptions.length === 2) {
    serviceStr = serviceDescriptions[0] + ' ' + O.conjAnd + ' ' + serviceDescriptions[1];
  } else {
    serviceStr = serviceDescriptions.slice(0, -1).join(', ') + ' ' + O.conjAnd + ' ' + serviceDescriptions[serviceDescriptions.length - 1];
  }

  if (hasFormation || hasTransfer || hasSuccession) {
    if (hasFormation && !hasTransfer && !hasSuccession) propTypeLabel = L.typeFormation;
    else if (hasTransfer && !hasFormation && !hasSuccession) propTypeLabel = L.typeTransfer;
    else if (hasSuccession && !hasFormation && !hasTransfer) propTypeLabel = L.typeSuccession;
    else propTypeLabel = L.typeMixed;
    openingParagraph = O.template(client || 'Client', serviceStr);
  } else if (hasStandalone) {
    propTypeLabel = L.typeStandalone;
    openingParagraph = O.template(client || 'Client', serviceStr);
  } else {
    propTypeLabel = L.typeMixed;
    openingParagraph = O.template(client || 'Client', '');
  }

  // ── No-template message ──
  if (hasNoTemplate) {
    document.getElementById('proposal-empty').style.display = 'none';
    document.getElementById('proposal-doc').style.display = 'none';
    const empEl = document.getElementById('proposal-empty');
    empEl.style.display = 'flex';
    empEl.innerHTML = `
      <div class="empty-icon">◈</div>
      <h3>${tl('alertNoTemplate')}</h3>
      <p style="max-width:320px;">
        ${lang==='pt'?'O serviço DCBE não possui template padrão. Elabore a proposta manualmente com base no escopo acordado com o cliente.':
          lang==='es'?'El servicio DCBE no tiene plantilla estándar. Elabore la propuesta manualmente según el alcance acordado con el cliente.':
          'The DCBE service does not have a standard template. Please draft the proposal manually based on the agreed scope with the client.'}
      </p>`;
    return;
  }

  // ── Highlight any remaining [PLACEHOLDER] tokens in rendered text ──
  function highlightPlaceholders(text) {
    return text.replace(/\[([^\]]+)\]/g, '<span class="placeholder-unfilled">[$1]</span>');
  }

  // ── Build terms sections ──
  function buildTermsSection(title, items, note, extraNote, bankNote) {
    return `
      <div class="terms-section">
        <div class="terms-section-heading">${title}</div>
        <ul class="terms-list">
          ${items.map(i => `<li>${i}</li>`).join('')}
        </ul>
        ${bankNote ? `<div class="terms-note" style="font-style:italic;">${bankNote.replace(/\n/g, '<br>')}</div>` : ''}
        ${note ? `<div class="terms-note">${note.replace(/\n/g, '<br>')}</div>` : ''}
        ${extraNote ? `<div class="third-party-note">⚑ ${extraNote}</div>` : ''}
      </div>
    `;
  }

  // Helper: get terms entry from FGC_CONFIG for the current language
  function getTerm(key) { return (FGC_CONFIG.terms[lang] && FGC_CONFIG.terms[lang][key]) || null; }

  let termsHTML = '';
  let termsSub = 0; // Sequential numbering within the Terms/Scope section

  // Helper: build terms and assign termsRef to each item for fee-table cross-reference
  function buildTermsForItems(items, opts) {
    items.forEach(it => {
      // shareRef items (e.g. AFR row) reuse the previous item's ref, no separate terms section
      if (it.shareRef) {
        it.termsRef = `${secTermsNum}.${termsSub}`;
        return;
      }
      // Reestru: simplified single-section approach
      if (it.key === 'reestru') {
        const ref = `${secTermsNum}.${++termsSub}`;
        it.termsRef = ref;
        const _lang = lang;
        const _defaultDescs = {
          pt: 'Assessoria na reestruturação societária da [NOME DA EMPRESA], incluindo a análise da estrutura existente, a preparação da documentação societária aplicável e a coordenação dos atos necessários à implementação da alteração proposta.',
          es: 'Asesoría en la reestructuración societaria de [NOMBRE DE LA EMPRESA], incluyendo el análisis de la estructura existente, la preparación de la documentación societaria aplicable y la coordinación de los actos necesarios para la implementación del cambio propuesto.',
          en: 'Advisory services for the corporate restructuring of [COMPANY NAME], including analysis of the existing structure, preparation of applicable corporate documentation, and coordination of the steps required to implement the proposed change.',
        };
        const _fabianaNote = {
          pt: 'Os honorários propostos consideram o escopo acima em sua forma padrão. Caso a demanda envolva maior complexidade, etapas adicionais, múltiplas jurisdições, participação de terceiros ou impactos regulatórios específicos, os honorários poderão ser revistos mediante avaliação do caso concreto.',
          es: 'Los honorarios propuestos consideran el alcance anterior en su forma estándar. Si la demanda involucra mayor complejidad, etapas adicionales, múltiples jurisdicciones, participación de terceros o impactos regulatorios específicos, los honorarios podrán ser revisados mediante evaluación del caso concreto.',
