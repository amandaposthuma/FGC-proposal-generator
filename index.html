          en: 'The proposed fees are based on the above scope in its standard form. Should the engagement involve greater complexity, additional steps, multiple jurisdictions, third-party participation, or specific regulatory impacts, the fees may be revised upon evaluation of the specific case.',
        };
        // Build description — use per-item data (supports multiple companies)
        const _itemReestruDesc = it.reestruDesc || '';
        const _itemCompanyName = it.reestruCompanyName || '';
        const _itemExtraBullets = it.reestruExtraBullets || '';
        const _itemReestruLabel = it.reestruLabel || '';
        let descText = _itemReestruDesc.trim() || _defaultDescs[_lang];
        // Replace company name placeholder
        if (_itemCompanyName.trim()) {
          descText = descText.replace('[NOME DA EMPRESA]', _itemCompanyName.trim())
                             .replace('[NOMBRE DE LA EMPRESA]', _itemCompanyName.trim())
                             .replace('[COMPANY NAME]', _itemCompanyName.trim());
        }
        // Build items list — highlight any unfilled [PLACEHOLDER] tokens
        const _items = [highlightPlaceholders(descText)];
        // Extra bullets
        if (_itemExtraBullets.trim()) {
          _itemExtraBullets.split('\n').forEach(line => {
            const t = line.trim();
            if (t) _items.push(highlightPlaceholders(t));
          });
        }
        const _defaultLabels = { pt: 'Reestruturação Societária', es: 'Reestructuración Societaria', en: 'Corporate Restructuring' };
        const _title = _itemReestruLabel.trim() || _defaultLabels[_lang];
        termsHTML += buildTermsSection(`${ref} — ${_title}`, _items, null, null, null);
        termsHTML += `<div class="terms-note" style="margin-top:6px;font-style:italic;">${_fabianaNote[_lang]}</div>`;
        return;
      }
      // Custom US state: generic formation scope with state name substituted
      if (it.key === 'customUS') {
        const ref = `${secTermsNum}.${++termsSub}`;
        it.termsRef = ref;
        const _stateName = it.stateName || 'Custom State';
        const _custTitle = { pt: `Constituição ${_stateName} LLC`, es: `Constitución ${_stateName} LLC`, en: `${_stateName} LLC Formation` }[lang];
        const _custItems = {
          pt: ['Pesquisa do nome da empresa','Registro no Department of State','Preparação dos documentos de incorporação','Standard Operating Agreement','Primeiro ano de fees do Agente Registrado','Obtenção de Tax ID/EIN (se necessário)'],
          es: ['Búsqueda del nombre de la empresa','Registro en el Department of State','Preparación de los documentos de incorporación','Standard Operating Agreement','Primer año de fees del Agente Registrado','Obtención de Tax ID/EIN (si es necesario)'],
          en: ['Company name search','Registration with the Department of State','Preparation of incorporation documents','Standard Operating Agreement','First year Registered Agent fees','Tax ID/EIN obtainment (if required)'],
        }[lang];
        termsHTML += buildTermsSection(`${ref} — ${_custTitle}`, _custItems, null, null, null);
        return;
      }
      // Custom US state maint
      if (it.key === 'customUSMaint') {
        const ref = `${secTermsNum}.${++termsSub}`;
        it.termsRef = ref;
        const _stateName = it.stateName || 'Custom State';
        const _custMaintTitle = { pt: `Manutenção Anual ${_stateName} LLC`, es: `Mantenimiento Anual ${_stateName} LLC`, en: `${_stateName} LLC Annual Maintenance` }[lang];
        const _custMaintItems = {
          pt: ['Taxa Governamental: Inclui as obrigações financeiras exigidas pelo governo para a manutenção da empresa em good standing','Taxa do Agente Registrado Local: Refere-se ao serviço de manutenção de um representante local para a empresa, garantindo uma gestão eficaz e o cumprimento dos procedimentos administrativos','Compliance Anual: Engloba a verificação e o cumprimento de requisitos necessários para assegurar a conformidade da empresa com as exigências das autoridades legais e a manutenção de sua regularidade'],
          es: ['Tasa Gubernamental: Incluye las obligaciones financieras exigidas por el gobierno para el mantenimiento de la empresa en good standing','Tasa del Agente Registrado Local: Se refiere al servicio de mantenimiento de un representante local para la empresa','Compliance Anual: Engloba la verificación y el cumplimiento de requisitos necesarios para asegurar la conformidad de la empresa'],
          en: ['Government Fee: Includes financial obligations required by the government to maintain the company in good standing','Local Registered Agent Fee: Refers to the maintenance of a local representative for the company, ensuring effective management and compliance with administrative procedures','Annual Compliance: Encompasses the verification and fulfillment of requirements necessary to ensure the company\'s conformity with legal authorities'],
        }[lang];
        const _custMaintNote = { pt: 'A elaboração do Tax Return não está incluída na taxa de manutenção anual.', es: 'La elaboración del Tax Return no está incluida en la tasa de mantenimiento anual.', en: 'Tax Return preparation is not included in the annual maintenance fee.' }[lang];
        termsHTML += buildTermsSection(`${ref} — ${_custMaintTitle}`, _custMaintItems, _custMaintNote, null, null);
        return;
      }
      // Custom bespoke items — render scope if provided
      if (['customOffshore','customTransfer','customAccounting','customDissolution'].includes(it.key)) {
        if (!it.customScope || !it.customScope.trim()) { it.noRef = true; return; }
        const bullets = it.customScope.split('\n').map(l => l.trim()).filter(Boolean);
        if (bullets.length === 0) { it.noRef = true; return; }
        const ref = `${secTermsNum}.${++termsSub}`;
        it.termsRef = ref;
        termsHTML += buildTermsSection(`${ref} — ${it.label}`, bullets.map(b => highlightPlaceholders(b)), null, null, null);
        return;
      }
      const m = getTerm(it.key);
      if (m) {
        const ref = `${secTermsNum}.${++termsSub}`;
        it.termsRef = ref;
        // Use scope override if set, otherwise standard items
        let itemsList = scopeOverrides[it.key] !== undefined
          ? scopeOverrides[it.key].split('\n\n').map(s => s.trim()).filter(Boolean)
          : [...m.items];
        // When FS is selected without AFR, remove the AFR bullet from scope
        if (it.key === 'fs' && !state.fsIncludeAFR) {
          itemsList = itemsList.filter(i => !i.includes('Annual Financial Return'));
        }
        if (opts && opts.extraBullet && opts.extraBullet.key === it.key) itemsList.push(opts.extraBullet.text);
        // Append additional note as extra bullet
        if (scopeNotes[it.key] && scopeNotes[it.key].trim()) itemsList.push(scopeNotes[it.key].trim());
        const isPartner = opts && opts.partnerKey === it.key;
        // FS note is BVI-specific (AFR submission); only show when a BVI entity is present
        const scopeNote = (it.key === 'fs' && !hasBVIEntity) ? null : m.note;
        termsHTML += buildTermsSection(`${ref} — ${m.title}`, itemsList, isPartner ? null : scopeNote, isPartner ? scopeNote : null, m.bankNote || null);
      }
    });
  }

  // Sec I terms (formation / transfer)
  buildTermsForItems(sec1Items);
  // Succession terms
  buildTermsForItems(secSuccItems);
  // Maintenance terms (BVI maint gets an extra bullet when Will is selected)
  const willMaintExtra = {
    pt: 'Gestão de prazos críticos, com alertas proativos para prevenir multas ou penalidades',
    es: 'Gestión de plazos críticos, con alertas proactivas para prevenir multas o penalidades',
    en: 'Management of critical deadlines, with proactive alerts to prevent fines or penalties',
  };
  buildTermsForItems(secMaintItems, state.will ? { extraBullet: { key: 'bviMaint', text: willMaintExtra[lang] } } : null);
  // Accounting terms
  buildTermsForItems(secAcctItems, { partnerKey: 'tr' });
  // Sec III terms
  buildTermsForItems(sec3Items);

  // ── Payment text ──
  let payText = '';
  if (isDissolutionOnly) payText = '';
  else if (hasFormation && hasTransfer) payText = FGC_CONFIG.paymentText[lang].mixed;
  else if (hasFormation && hasMaint) payText = FGC_CONFIG.paymentText[lang].formation;
  else if (hasTransfer && hasMaint) payText = FGC_CONFIG.paymentText[lang].transfer;
  else if (hasMaint && !hasFormation && !hasTransfer) payText = FGC_CONFIG.paymentText[lang].maintenanceOnly;
  else payText = FGC_CONFIG.paymentText[lang].mixed;

  // ── Dynamic timelines items (service-specific instead of generic) ──
  const timelinesItems = [];
  if ((hasPICForm || hasUSForm) && !hasTransfer) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 5 a 15 dias úteis para constituição das empresas, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 5 a 15 días hábiles para la constitución de las empresas, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for company formation is 5 to 15 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  } else if (hasTransfer && !(hasPICForm || hasUSForm)) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 5 a 15 dias úteis para transferência das empresas, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 5 a 15 días hábiles para la transferencia de las empresas, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for company transfer is 5 to 15 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  } else if ((hasPICForm || hasUSForm) && hasTransfer) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 5 a 15 dias úteis para constituição ou transferência das empresas, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 5 a 15 días hábiles para la constitución o transferencia de las empresas, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for company formation or transfer is 5 to 15 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  }
  if (hasApostila) {
    timelinesItems.push({
      pt: "O prazo estimado para notarização e apostilamento é de 10 a 15 dias úteis, contados a partir da conclusão da formação da empresa. Este prazo pode variar conforme os prazos estipulados pelos órgãos governamentais competentes.",
      es: "El plazo estimado para notarización y apostillado es de 10 a 15 días hábiles, contados desde la conclusión de la formación de la empresa. Este plazo puede variar según los plazos establecidos por las autoridades gubernamentales competentes.",
      en: "Estimated timeframe for notarization and apostille is 10 to 15 business days from completion of company formation. This timeline may vary as it is subject to timelines set by the competent government authorities.",
    }[lang]);
  }
  // FL dissolution prazo
  if (state.dissolucaoFL) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 3 a 5 dias úteis para a conclusão do processo de dissolução da Florida LLC, contados a partir do recebimento dos termos de dissolução assinados pelo cliente.",
      es: "Estimamos un plazo de 3 a 5 días hábiles para la conclusión del proceso de disolución de la Florida LLC, contados desde la recepción de los términos de disolución firmados por el cliente.",
      en: "We estimate a timeframe of 3 to 5 business days for completion of the Florida LLC dissolution process, beginning upon receipt of the dissolution terms signed by the client.",
    }[lang]);
  }
  // DE dissolution prazo
  if (state.dissolucaoDE) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 3 a 5 dias úteis para a conclusão do processo de dissolução da Delaware LLC, contados a partir do recebimento dos termos de dissolução assinados pelo cliente.",
      es: "Estimamos un plazo de 3 a 5 días hábiles para la conclusión del proceso de disolución de la Delaware LLC, contados desde la recepción de los términos de disolución firmados por el cliente.",
      en: "We estimate a timeframe of 3 to 5 business days for completion of the Delaware LLC dissolution process, beginning upon receipt of the dissolution terms signed by the client.",
    }[lang]);
  }
  // Share Trust prazo
  if (state.trust) {
    timelinesItems.push({
      pt: "Estimamos um prazo de 15 a 30 dias úteis para constituição do Share Trust, contados a partir da confirmação do pagamento e entrega de toda a documentação necessária.",
      es: "Estimamos un plazo de 15 a 30 días hábiles para la constitución del Share Trust, contados desde la confirmación del pago y la entrega de toda la documentación necesaria.",
      en: "Estimated timeframe for Share Trust formation is 15 to 30 business days, beginning upon receipt of payment and all required documentation.",
    }[lang]);
  }
  // Always include compliance review note
  timelinesItems.push({
    pt: "Esses prazos estão sujeitos a revisão da documentação e aprovação pelo nosso Departamento de Compliance.",
    es: "Estos plazos están sujetos a revisión de la documentación y aprobación por nuestro Departamento de Compliance.",
    en: "These timeframes are subject to the review and approval of the documentation by our Compliance Department.",
  }[lang]);

  // ── Build fee table rows ──
  function buildTableRows(items) {
    return items.map(it => {
      let amountStr;
      if (it.complimentary) {
        amountStr = lang === 'en' ? 'Complimentary' : 'Cortesia';
      } else if (it.negotiate) {
        amountStr = lang === 'en' ? 'To be negotiated' : lang === 'es' ? 'A negociar' : 'A negociar';
      } else if (it.amount !== null && it.amount !== undefined) {
        amountStr = fmt(it.amount);
      } else {
        amountStr = '—';
      }
      return `
      <tr>
        <td>
          <div class="row-label">${it.label}</div>
          ${!it.noRef ? `<div class="row-ref">${L.colRef} ${it.termsRef || it.num}</div>` : ''}
        </td>
        <td>
          <div class="row-amount">${amountStr}</div>
        </td>
        <td>
          <div class="row-payment">${it.pay.split('\n')[0]}</div>
          ${it.pay.includes('\n') ? it.pay.split('\n').slice(1).map(l => `<div class="row-anual">${l}</div>`).join('') : ''}
        </td>
      </tr>
    `;
    }).join('');
  }

  // ── Macro category headers ──
  function macroHeader(text) {
    return `<div class="macro-category">${text}</div>`;
  }

  function buildFeeTable(items) {
    const thRow = `<thead><tr><th>${L.colService}</th><th style="white-space:nowrap">${L.colAmount}</th><th>${L.colPayment}</th></tr></thead>`;
    return `<table class="fee-table">${thRow}<tbody>${buildTableRows(items)}</tbody></table>`;
  }

  function buildSectionSubtotal(items) {
    // year1: items paid on acceptance (formation + maintenance when timing='acceptance')
    // year2: all annual recurring items (maintenance always recurs) + year2-only items (mailing)
    // safeAmt: treat null/undefined/NaN/complimentary as 0
    function safeAmt(it) {
      if (it.complimentary) return 0;
      const n = Number(it.amount);
      return isNaN(n) ? 0 : n;
    }
    const year1Total = items.filter(it => it.pay === L.payOnAcceptance && !it.complimentary).reduce((s, it) => s + safeAmt(it), 0);
    const year2Total = items.filter(it => it.recurring || (it.pay !== L.payOnAcceptance && !it.complimentary && it.amount != null)).reduce((s, it) => s + safeAmt(it), 0);
    if (year1Total <= 0 && year2Total <= 0) return '';
    const lblYear1 = { pt: 'Valor 1º ano', es: 'Valor 1er año', en: 'Year 1 Total' }[lang];
    const lblYear2 = { pt: 'Valor anual a partir do 2º ano', es: 'Valor anual a partir del 2º año', en: 'Annual Total from Year 2' }[lang];
    let html = '<div style="text-align:right;font-size:12px;font-weight:600;color:var(--dark);padding:8px 0 4px;border-top:1px solid var(--border-light);margin-top:4px;">';
    if (year1Total > 0) html += `${lblYear1}: ${fmt(year1Total)}`;
    if (year1Total > 0 && year2Total > 0) html += '<br>';
    if (year2Total > 0) html += `${lblYear2}: ${fmt(year2Total)}`;
    html += '</div>';
    return html;
  }

  const sec1PIC   = sec1Items.filter(it => it.group === 'pic');
  const sec1US    = sec1Items.filter(it => it.group === 'us');
  const sec1Other = sec1Items.filter(it => !it.group);

  const secMaintPIC   = secMaintItems.filter(it => it.group === 'pic');
  const secMaintUS    = secMaintItems.filter(it => it.group === 'us');
  const secMaintOther = secMaintItems.filter(it => !it.group);

  const secAcctPIC   = secAcctItems.filter(it => it.group === 'pic');
  const secAcctUS    = secAcctItems.filter(it => it.group === 'us');
  const secAcctOther = secAcctItems.filter(it => !it.group);

  // (Grand total summary removed — using per-section subtotals instead)

  // ── Signature section ──
  // Build grouped service items for Sim/Não confirmation
  // Complementary services are grouped together (e.g., formation + maintenance, BVI + AFR)
  const sigServiceGroups = [];

  // Group formation/transfer + their maintenance
  sec1Items.forEach(it => {
    // Find matching maintenance for this formation/transfer
    const maintMap = { bvi:'bviMaint', bahamas:'bahamasMaint', cayman:'caymanMaint', nevis:'nevisMaint',
      fl:'flMaint', de:'deMaint', ny:'nyMaint', sd:'sdMaint', trust:'trustMaint',
      transBVI:'bviMaint', transBahamas:'bahamasMaint', transCayman:'caymanMaint', transNevis:'nevisMaint',
      transFL:'flMaint', transDE:'deMaint', transNY:'nyMaint', transSD:'sdMaint',
      transBVIRA:'bviMaint', transBahamasRA:'bahamasMaint', transCaymanRA:'caymanMaint', transNevisRA:'nevisMaint',
      transFLRA:'flMaint', transDERA:'deMaint' };
    const maintKey = maintMap[it.key];
    const maintItem = maintKey ? secMaintItems.find(m => m.key === maintKey) : null;
    let groupLabel = it.label;
    if (maintItem) groupLabel += ' + ' + termTitle(maintKey);
    sigServiceGroups.push(groupLabel);
  });

  // Succession
  secSuccItems.forEach(it => sigServiceGroups.push(it.label));

  // Mailing address (standalone optional service)
  const mailingItem = secMaintItems.find(m => m.key === 'mailing');
  if (mailingItem) sigServiceGroups.push(mailingItem.label);

  // Accounting items — each appears as its own line
  secAcctItems.forEach(it => {
    if (it.key === 'fsAfr') return;  // delivery note only
    if (it.key === 'fs3rd') return;  // described in proposal body
    if (it.key === 'tr3rd') return;  // third party
    sigServiceGroups.push(it.label);
  });

  // Dissolution / Other (reestru shows as aggregate label)
  sec3Items.forEach(it => sigServiceGroups.push(it.label));

  // Deduplicate
  const selectedServiceNames = [...new Set(sigServiceGroups)];

  // Build named signature lines — always show at least one client line
  const sigNames = [];
  const sigClientLabel = client || { pt: 'Beneficiário / Representante Autorizado', es: 'Beneficiario / Representante Autorizado', en: 'Beneficiary / Authorized Representative' }[lang];
  sigNames.push(sigClientLabel);
  const advisorVal = document.getElementById('f-advisor').value.trim();

  // Closing paragraph (Fabiana signature block) — before the acceptance section
  const closingHTML = L.closingText ? (() => {
    // Signer map: advisor name → { cursive, formal }
    const signerMap = {
      'fabiana': { cursive: 'Fabiana Ciobataru', formal: 'Fabiana G. Ciobataru' },
      'claudia': { cursive: 'Claudia Grosman', formal: 'Claudia F. Grosman' },
    };
    const advisorLower = (document.getElementById('f-advisor').value || '').trim().toLowerCase();
    // Match advisor to signer (check if advisor name contains any key)
    let signer = signerMap['fabiana']; // default
    for (const [key, val] of Object.entries(signerMap)) {
      if (advisorLower.includes(key)) { signer = val; break; }
    }
    // Replace the default name with the matched signer + cursive signature
    const styledText = L.closingText.replace(/\n/g, '<br>').replace('Fabiana G. Ciobataru',
      '<span style="font-family:\'Dancing Script\',cursive;font-size:22px;font-weight:700;display:block;margin:4px 0 2px;">' + signer.cursive + '</span><span style="font-size:11px;color:var(--text-light);">' + signer.formal + '</span>');
    return `<div style="font-size:12px;line-height:1.7;color:var(--text);margin-top:32px;margin-bottom:32px;">${styledText}</div>`;
  })() : '';

  const signatureHTML = `
    ${closingHTML}
    <div class="signature-section">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">${L.sigHeader}</div>
      <div style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:18px;">${FGC_CONFIG.sigIntro[lang]}</div>
      <div style="font-size:11px;font-weight:600;margin-bottom:8px;">${L.sigServicesLabel}</div>
      <div style="margin-bottom:24px;">
        ${selectedServiceNames.map(name => {
          const yesLabel = lang === 'en' ? 'Yes' : lang === 'es' ? 'Sí' : 'Sim';
          const noLabel  = lang === 'en' ? 'No'  : lang === 'es' ? 'No' : 'Não';
          const radioName = 'sig_' + name.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
          return `
          <div style="display:flex;align-items:center;gap:10px;font-size:11px;margin-bottom:6px;padding:4px 0;">
            <span style="flex:1;">${name}</span>
            <label style="display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;"><input type="radio" name="${radioName}" style="accent-color:var(--dark);"> ${yesLabel}</label>
            <label style="display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;"><input type="radio" name="${radioName}" style="accent-color:var(--dark);"> ${noLabel}</label>
          </div>`;
        }).join('')}
      </div>
      ${sigNames.map(name => `
      <div style="margin-bottom:28px;">
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">
          <div>
            <div style="border-bottom:1px solid var(--dark);height:36px;"></div>
            <div style="font-size:9px;color:var(--text-light);margin-top:4px;">${L.sigLine1}</div>
          </div>
          <div>
            <div style="border-bottom:1px solid var(--dark);height:36px;"></div>
            <div style="font-size:9px;color:var(--text-light);margin-top:4px;">${L.sigLine2}</div>
          </div>
        </div>
      </div>
      `).join('')}
      <div style="font-size:10px;color:var(--text-light);margin-top:16px;">${L.sigValidity}</div>
    </div>
  `;

  // ── Assemble document ──
  const docHTML = `
    <div class="doc-header">
      <div class="doc-logo">${triva
        ? `<span style="display:inline-flex;align-items:center;"><img src="${LOGO_TRIVA}" alt="Triva" style="height:18px;display:block;margin-right:14px;"><span style="font-size:11px;font-weight:400;color:var(--text-light);font-family:var(--font);margin-right:2px;">by</span><img src="${LOGO_DARK}" alt="FGC." style="height:22px;display:block;"></span>`
        : `<img src="${LOGO_DARK}" alt="FGC." style="height:44px;display:block;">`}</div>
      <div class="doc-header-label">${L.lblProposal}</div>
    </div>

    <div class="doc-body">
      <div style="font-size:12px;line-height:1.7;margin-bottom:24px;">
        <div style="font-weight:600;">${client || 'Client'}</div>
        ${careOf ? `<div style="font-size:11px;color:var(--text-light);">${L.careOfPrefix} ${careOf}</div>` : ''}
        ${extraLine ? `<div style="font-size:11px;color:var(--text-light);">${extraLine}</div>` : ''}
        ${clientEmail ? `<div>${clientEmail}</div>` : ''}
        <div>${dateStr}</div>
      </div>

      <div class="opening-text"><strong>${getSalutation()} ${(client || 'Client').split(' ')[0]},</strong><br>${openingParagraph}</div>

      <!-- SECTION I: HONORÁRIOS — all fee sub-sections under one header -->
      ${hasFeeContent ? `
      <div class="doc-section">
        <div class="doc-section-header">${feeSecHeader}</div>

        ${hasSec1Content ? `
          <div class="doc-section-subheader" style="margin-top:24px;">${sec1SubLabel}</div>
          ${sec1PIC.length > 0   ? macroHeader(L.macroPIC) + buildFeeTable(sec1PIC)   : ''}
          ${sec1US.length > 0    ? macroHeader(L.macroUS)  + buildFeeTable(sec1US)    : ''}
          ${sec1Other.length > 0 ? buildFeeTable(sec1Other) : ''}
          ${buildSectionSubtotal(sec1Items)}
        ` : ''}

        ${secSuccItems.length > 0 ? `
          <div class="doc-section-subheader" style="margin-top:20px;">${secSuccSubLabel}</div>
          ${buildFeeTable(secSuccItems)}
          ${buildSectionSubtotal(secSuccItems)}
        ` : ''}

        ${secMaintItems.length > 0 ? `
          <div class="doc-section-subheader" style="margin-top:20px;">${secMaintSubLabel}</div>
          ${secMaintPIC.length > 0 ? macroHeader(L.macroPIC) + buildFeeTable(secMaintPIC) : ''}
          ${secMaintUS.length > 0  ? macroHeader(L.macroUS)  + buildFeeTable(secMaintUS)  : ''}
          ${secMaintOther.filter(it => it.key === 'trustMaint').length > 0 ? macroHeader({ pt: 'Share Trust', es: 'Share Trust', en: 'Share Trust' }[lang]) + buildFeeTable(secMaintOther.filter(it => it.key === 'trustMaint')) : ''}
          ${secMaintOther.filter(it => it.key !== 'trustMaint').length > 0 ? buildFeeTable(secMaintOther.filter(it => it.key !== 'trustMaint')) : ''}
          ${buildSectionSubtotal(secMaintItems)}
        ` : ''}

        ${secAcctItems.length > 0 ? `
          <div class="doc-section-subheader" style="margin-top:20px;">${secAcctSubLabel}</div>
          ${secAcctPIC.length > 0 ? macroHeader(L.macroPIC) + buildFeeTable(secAcctPIC) : ''}
          ${secAcctUS.length > 0  ? macroHeader(L.macroUS)  + buildFeeTable(secAcctUS)  : ''}
          ${secAcctOther.length > 0 ? buildFeeTable(secAcctOther) : ''}
          ${buildSectionSubtotal(secAcctItems)}
        ` : ''}

        ${sec3Items.length > 0 ? `
          <div class="doc-section-subheader" style="margin-top:20px;">${sec3SubLabel}</div>
          ${buildFeeTable(sec3Items)}
        ` : ''}

      </div>
      ` : ''}

      <!-- Third-party FS/TR notes (rendered as sub-notes within Accounting section, not as separate section header) -->
      ${(has3rdPartyFS || has3rdPartyTR) ? `
      <div style="margin-top:4px;margin-bottom:24px;padding:8px 12px;background:rgba(7,18,16,0.03);border-left:3px solid var(--border);border-radius:2px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px;">${lang==='pt'?'Serviços por Terceiros':lang==='es'?'Servicios por Terceros':'Third-Party Services'}</div>
        ${has3rdPartyFS ? `<div class="third-party-note" style="margin-bottom:6px;">⚑ ${FGC_CONFIG.thirdPartyNotes[lang].fs}</div>` : ''}
        ${has3rdPartyTR ? `<div class="third-party-note">⚑ ${FGC_CONFIG.thirdPartyNotes[lang].tr}</div>` : ''}
      </div>
      ` : ''}

      <!-- SECTION: Scope of Services -->
      ${termsHTML ? `
      <div class="doc-section">
        <div class="doc-section-header">${secTermsHeader}</div>
        ${termsHTML}
      </div>
      ` : ''}

      <!-- Other not included (US-only proposals exclude "Reestruturações" per master templates) -->
      ${(() => {
        const clauseSet = isDissolutionOnly ? FGC_CONFIG.dissolucaoClauses[lang] : FGC_CONFIG.clauses[lang];
        let notIncItems = clauseSet.notIncludedItems;
        if (!isDissolutionOnly) {
          const reestruKeywords = { pt: 'Reestruturações', es: 'Reestructuraciones', en: 'Restructurings' };
          if (!hasPICForm && !hasPICTrans) {
            notIncItems = notIncItems.filter(i => i !== reestruKeywords[lang]);
          }
        }
        // FL dissolution includes Tax Return as a scope item — remove it from not-included list
        if (isDissolutionOnly && state.dissolucaoFL && !state.dissolucaoDE) {
          const trKeywords = { pt: 'Preparação de Tax Return final', es: 'Preparación de Tax Return final', en: 'Preparation of final Tax Return' };
          notIncItems = notIncItems.filter(i => i !== trKeywords[lang]);
        }
        return `
      <div class="doc-section">
        <div class="doc-section-header">III. ${clauseSet.notIncluded.title}</div>
        <ul class="terms-list">
          ${notIncItems.map(i => '<li>' + i + '</li>').join('')}
        </ul>
      </div>

      <!-- SECTION: Terms & Conditions -->
      <div class="doc-section">
        <div class="doc-section-header">${secTCHeader}</div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.1 — ${clauseSet.payment.title}</div>
          <ul class="terms-list">${payText ? payText.replace(/\. /g, '.|').split('|').filter(Boolean).map(s => '<li>' + s + '</li>').join('') : ''}${clauseSet.payment.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.2 — ${clauseSet.timelines.title}</div>
          <ul class="terms-list">${timelinesItems.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.3 — ${clauseSet.compliance.title}</div>
          <ul class="terms-list">${clauseSet.compliance.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.4 — ${clauseSet.representation.title}</div>
          <ul class="terms-list">${clauseSet.representation.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
        <div class="terms-section">
          <div class="terms-section-heading">${secTCNum}.5 — ${clauseSet.legalChanges.title}</div>
          <ul class="terms-list">${clauseSet.legalChanges.items.map(i => '<li>' + i + '</li>').join('')}</ul>
        </div>
      </div>`;
      })()}

      <!-- Signature Section -->
      ${signatureHTML}
    </div>

    <div class="doc-footer">
      <div class="doc-footer-logo">${triva
        ? `<span style="display:inline-flex;align-items:center;"><img src="${LOGO_TRIVA}" alt="Triva" style="height:12px;display:block;margin-right:3px;"><span style="font-size:9px;color:var(--text-light);font-family:var(--font);margin-right:1px;">by</span><img src="${LOGO_DARK}" alt="FGC." style="height:10px;display:block;"></span>`
        : `<img src="${LOGO_DARK}" alt="FGC." style="height:24px;display:block;">`}</div>
      <div class="doc-footer-contact">
        <span>contact@fgcadvisors.com &nbsp;·&nbsp; +1 305 432 3009</span>
        <span>1001 Brickell Bay Drive #2110, Miami, FL 33131</span>
      </div>
    </div>
  `;

  const docEl = document.getElementById('proposal-doc');
  // Reset edit mode whenever a new proposal is generated
  _editMode = false;
  docEl.contentEditable = 'false';
  docEl.style.outline = '';
  const editBtn = document.getElementById('btn-edit-proposal');
  if (editBtn) { editBtn.textContent = '✏ Editar'; editBtn.classList.remove('active'); editBtn.style.display = ''; }
  docEl.innerHTML = `<div id="edit-mode-banner" style="display:none;background:var(--dust,#9AB4B0);color:#fff;font-size:11px;font-weight:600;padding:6px 12px;text-align:center;border-radius:4px 4px 0 0;letter-spacing:0.2px;"></div>` + docHTML;
  docEl.style.display = 'block';
  document.getElementById('proposal-empty').style.display = 'none';
  document.getElementById('btn-new-proposal').style.display = '';
  updateTopbar();
  updateEmailPanel();
}

// ═══════════════════════════════════════════════════════════════════
//  EMAIL PANEL
// ═══════════════════════════════════════════════════════════════════
function toggleEmailPanel() {
  const panel = document.getElementById('email-panel');
  panel.classList.toggle('open');
  const btn = document.getElementById('btn-email-toggle');
  if (btn) btn.classList.toggle('active', panel.classList.contains('open'));
}

function updateEmailPanel() {
  // Email language always matches proposal language
  const emailLang = lang;
  const client = document.getElementById('f-client').value.trim() || 'Cliente';

  // Build services list using term titles from FGC_CONFIG (same source as proposal)
  function emailTermTitle(k) {
    return (FGC_CONFIG.terms[emailLang] && FGC_CONFIG.terms[emailLang][k])
      ? FGC_CONFIG.terms[emailLang][k].title : k;
  }
  const services = [];
  [...PIC_FORM_KEYS, ...US_FORM_KEYS].forEach(k => { if (state[k]) services.push(emailTermTitle(k)); });
  ALL_TRANS_KEYS.forEach(k => { if (state[k]) services.push(emailTermTitle(k)); });
  if (state.trust) services.push(emailTermTitle('trust'));
  if (state.will) services.push(emailTermTitle('will'));
  if (state.apostila) services.push(emailTermTitle('apostila'));
  if (state.mailing) services.push(emailTermTitle('mailing'));
  if (state.transFS) services.push({ pt: 'Demonstrações Financeiras Ano Anterior (FS)', es: 'Estados Financieros Año Anterior (FS)', en: 'Prior Year Financial Statements (FS)' }[emailLang]);
  if (state.transTR) services.push({ pt: 'Tax Return Ano Anterior (TR)', es: 'Tax Return Año Anterior (TR)', en: 'Prior Year Tax Return (TR)' }[emailLang]);
  if (state.fs) services.push(emailTermTitle('fs'));
  if (state.tr) services.push(emailTermTitle('tr'));
  if (state.fs3rd) services.push({ pt: 'Demonstrações Financeiras por Terceiros', es: 'Estados Financieros por Terceros', en: 'Financial Statements (Third Party)' }[emailLang]);
  if (state.tr3rd) services.push({ pt: 'Tax Return por Terceiros', es: 'Tax Return por Terceros', en: 'Tax Return (Third Party)' }[emailLang]);
  if (state.fsAnterior) services.push({ pt: 'Demonstrações Financeiras - Anos Anteriores', es: 'Estados Financieros - Años Anteriores', en: 'Financial Statements - Prior Years' }[emailLang]);
  if (state.trAnterior) services.push({ pt: 'Tax Return - Anos Anteriores', es: 'Tax Return - Años Anteriores', en: 'Tax Return - Prior Years' }[emailLang]);
  if (state.dissolucaoBVI) services.push(emailTermTitle('dissolucaoBVI'));
  if (state.dissolucaoFL) services.push(emailTermTitle('dissolucaoFL'));
  if (state.dissolucaoDE) services.push(emailTermTitle('dissolucaoDE'));

  // Build natural-language service description (same logic as proposal opening)
  const O = FGC_CONFIG.opening[emailLang];
  const descs = [];
  if (PIC_FORM_KEYS.some(k => state[k])) descs.push(O.descFormationPIC);
  if (US_FORM_KEYS.some(k => state[k]))  descs.push(O.descFormationUS);
  if (PIC_TRANS_KEYS.some(k => state[k]) || PIC_TRANS_RA_KEYS.some(k => state[k])) descs.push(O.descTransferPIC);
  if (US_TRANS_KEYS.some(k => state[k]) || US_TRANS_RA_KEYS.some(k => state[k]))  descs.push(O.descTransferUS);
  if (state.trust) descs.push(O.descTrust);
  if (state.will)  descs.push(O.descSuccession);
  if (state.dissolucaoFL) descs.push(O.descDissolutionFL);
  if (state.dissolucaoDE) descs.push(O.descDissolutionDE);
  let serviceDescription = '';
  if (descs.length === 1) serviceDescription = descs[0];
  else if (descs.length === 2) serviceDescription = descs[0] + ' ' + O.conjAnd + ' ' + descs[1];
  else if (descs.length > 2) serviceDescription = descs.slice(0, -1).join(', ') + ' ' + O.conjAnd + ' ' + descs[descs.length - 1];

  const svcList = services.map(s => `• ${s}`).join('\n');
  const body = (FGC_CONFIG.email[emailLang] && FGC_CONFIG.email[emailLang].body) ? FGC_CONFIG.email[emailLang].body(client, svcList, serviceDescription) : '';

  const ta = document.getElementById('email-textarea');
  if (ta) ta.value = body;
}

function copyEmail() {
  const ta = document.getElementById('email-textarea');
  if (!ta) return;
  ta.select();
  navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
  const btn = ta.parentElement.querySelector('.email-copy-btn');
  if (btn) { const orig = btn.textContent; btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = orig, 1500); }
}

// ═══════════════════════════════════════════════════════════════════
//  ADVISOR PERSISTENCE (in-memory only — resets on page load, no localStorage)
// ═══════════════════════════════════════════════════════════════════
let _advisorList = [];
function getAdvisors() {
  return _advisorList.slice();
}
function saveAdvisor(name) {
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (!_advisorList.includes(trimmed)) {
    _advisorList.push(trimmed);
  }
}
function removeAdvisor(name) {
  _advisorList = _advisorList.filter(n => n !== name);
  renderAdvisorChips();
}
function addAdvisorFromInput() {
  const inp = document.getElementById('f-advisor');
  const name = inp.value.trim();
  if (!name) return;
  saveAdvisor(name);
  renderAdvisorChips();
  debouncedUpdate();
}
function selectAdvisorChip(name) {
  document.getElementById('f-advisor').value = name;
  renderAdvisorChips();
  debouncedUpdate();
}
function renderAdvisorChips() {
  const container = document.getElementById('advisor-chips');
  if (!container) return;
  const advisors = getAdvisors();
  const current = (document.getElementById('f-advisor').value || '').trim();
  container.innerHTML = '';
  advisors.forEach(name => {
    const chip = document.createElement('span');
    chip.className = 'advisor-chip' + (name === current ? ' active' : '');
    chip.onclick = () => selectAdvisorChip(name);
    chip.title = 'Click to select';
    const label = document.createElement('span');
    label.textContent = name;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'advisor-chip-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove';
    removeBtn.onclick = (e) => { e.stopPropagation(); removeAdvisor(name); };
    chip.appendChild(label);
    chip.appendChild(removeBtn);
    container.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  PDF EXPORT — uses browser print engine for perfect pagination
//  The browser respects CSS page-break rules and @page margins,
//  so content never gets cut mid-line.
// ═══════════════════════════════════════════════════════════════════
function exportInteractivePDF() {
  const proposalEl = document.getElementById('proposal-doc');
  if (!proposalEl || proposalEl.style.display === 'none') {
    alert('Please generate a proposal first.');
    return;
  }
  // Use the browser's native print dialog — select "Save as PDF"
  // The @media print CSS handles margins, page breaks, and layout
  window.print();
}

// ═══════════════════════════════════════════════════════════════════
//  RESET PROPOSAL
// ═══════════════════════════════════════════════════════════════════
function resetProposal() {
  // Reset all service state
  Object.keys(state).forEach(k => { state[k] = false; });
  state.fsIncludeAFR = true;       // restore default
  state.maintPayTiming = 'acceptance'; // restore default
  // Clear all price/qty/scope overrides
  priceOverrides = {};
  qty = {};
  _lastTrivaMode = null;
  scopeNotes = {};
  scopeOverrides = {};
  customReestruItems = [];
  _customIdSeq = 0;
  maintPriceOverrides = {};
  reestruEntries = [{ label: '', companyName: '', desc: '', extraBullets: '', price: '', qty: 1 }];
  customStates       = [{ name: '', price: '', qty: 1, maintPrice: '' }];
  customOffshore     = [{ label: '', price: '', qty: 1, maintPrice: '', scope: '' }];
  customTransfers    = [{ label: '', price: '', qty: 1, scope: '' }];
  customAccounting   = [{ label: '', price: '', qty: 1, payTerm: 'acceptance', scope: '' }];
  customDissolutions = [{ label: '', price: '', qty: 1, scope: '' }];
  // Clear form fields
  document.getElementById('f-client').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-advisor').value = '';
  const careofEl = document.getElementById('f-careof');
  if (careofEl) careofEl.value = '';
  const extraEl = document.getElementById('f-extra');
  if (extraEl) extraEl.value = '';
  // Reset date to today
  const today = new Date();
  document.getElementById('f-date').value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  // Close email panel if open
  const emailPanel = document.getElementById('email-panel');
  if (emailPanel && emailPanel.classList.contains('open')) {
    emailPanel.classList.remove('open');
    const emailBtn = document.getElementById('btn-email-toggle');
    if (emailBtn) emailBtn.classList.remove('active');
  }
  // Hide proposal, show empty
  document.getElementById('proposal-doc').style.display = 'none';
  document.getElementById('proposal-empty').style.display = 'flex';
  // Re-render checkboxes
  renderServicePicker();
  renderUI();
  updateTopbar();
  // Toggle button visibility
  document.getElementById('btn-new-proposal').style.display = 'none';
  document.getElementById('btn-generate').style.display = '';
  const editBtnReset = document.getElementById('btn-edit-proposal');
  if (editBtnReset) editBtnReset.style.display = 'none';
  _editMode = false;
}

// ── Password Gate Functions ──
function togglePWVisibility() {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function checkPW() {
  const pw = document.getElementById('pw-input').value;
  const errEl = document.getElementById('pw-error');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = 'Digite a senha.'; return; }
  if (btoa(unescape(encodeURIComponent(pw))) === CORRECT_PW_B64) {
    document.getElementById('pw-gate').classList.add('hidden');
  } else {
    errEl.textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // Inject logo into password gate
  const pwLogo = document.getElementById('pw-logo');
  if (pwLogo) pwLogo.src = LOGO_DARK;

  const today = new Date();
  const yyyy = today.getFullYear();

  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('f-date').value = `${yyyy}-${mm}-${dd}`;

  if (fgcImg) fgcImg.src = LOGO_DARK;
  if (trivaImg) trivaImg.src = LOGO_TRIVA;
  renderServicePicker();
  renderUI();
  renderAdvisorChips();
  // Focus password input
  document.getElementById('pw-input').focus();
});
